<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Panel Instruktora — Krav Maga Saggita</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0b0b0d;
      --bg2: #111115;
      --panel: #16161c;
      --panel2: #1e1e26;
      --line: #252530;
      --line2: #2e2e3e;
      --text: #dddde8;
      --dim: #7777a0;
      --dim2: #4a4a6a;
      --accent: #c8230a;
      --accent2: #e53015;
      --asoft: rgba(200, 35, 10, .15);
      --aborder: rgba(200, 35, 10, .35);
      --green: #1a9952;
      --gsoft: rgba(26, 153, 82, .15);
      --gborder: rgba(26, 153, 82, .35);
      --yellow: #b08000;
      --ysoft: rgba(176, 128, 0, .15);
      --yborder: rgba(176, 128, 0, .35);
      --blue: #1a60c8;
      --bsoft: rgba(26, 96, 200, .12);
      --sbw: 210px;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.5
    }

    button {
      cursor: pointer;
      font-family: inherit;
      font-size: 13px
    }

    input,
    select,
    textarea {
      font-family: inherit;
      font-size: 13px
    }

    a {
      color: inherit;
      text-decoration: none
    }

    /* ─── LOGIN ─────────────────────────────────────────────────── */
    #pg-login {
      display: flex;
      height: 100dvh;
      align-items: center;
      justify-content: center;
      background: var(--bg)
    }

    #pg-login::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 500px 350px at 50% 35%, rgba(200, 35, 10, .07), transparent 65%);
      pointer-events: none
    }

    .lbox {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--line2);
      width: 340px;
      padding: 36px 32px 32px
    }

    .lbrand {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 4px
    }

    .lbrand span {
      color: var(--accent)
    }

    .lsub {
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 28px
    }

    .lf label {
      display: block;
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 5px
    }

    .lf input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--line2);
      padding: 9px 11px;
      color: var(--text);
      outline: none;
      margin-bottom: 12px
    }

    .lf input:focus {
      border-color: var(--accent)
    }

    .lbtn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      border: none;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 4px;
      transition: background .15s
    }

    .lbtn:hover {
      background: var(--accent2)
    }

    .lerr {
      margin-top: 10px;
      padding: 8px 10px;
      background: var(--asoft);
      border: 1px solid var(--aborder);
      color: #ff7a5a;
      font-size: 11px;
      font-weight: 600;
      display: none
    }

    .lerr.show {
      display: block
    }

    /* ─── APP ────────────────────────────────────────────────────── */
    #app {
      display: none;
      height: 100dvh;
      flex-direction: row
    }

    #app.on {
      display: flex
    }

    /* Sidebar */
    #sb {
      width: var(--sbw);
      min-width: var(--sbw);
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column
    }

    .sb-top {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--line)
    }

    .sb-brand {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #fff
    }

    .sb-brand em {
      color: var(--accent);
      font-style: normal
    }

    .sb-who {
      margin-top: 6px
    }

    .sb-who strong {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text)
    }

    .sb-who span {
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: .08em
    }

    .sb-nav {
      padding: 10px 8px;
      flex: 1
    }

    .sb-sec {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--dim2);
      padding: 8px 8px 4px;
      margin-top: 4px
    }

    .ni {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      color: var(--dim);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all .12s;
      border-left: 2px solid transparent;
      margin-bottom: 1px
    }

    .ni:hover {
      color: var(--text);
      background: var(--panel2)
    }

    .ni.on {
      color: var(--text);
      border-left-color: var(--accent);
      background: var(--asoft)
    }

    .ni-ico {
      font-size: 13px;
      width: 16px;
      text-align: center;
      flex-shrink: 0
    }

    .sb-bot {
      padding: 10px 8px;
      border-top: 1px solid var(--line)
    }

    .lout {
      width: 100%;
      padding: 7px 10px;
      background: transparent;
      border: 1px solid var(--line2);
      color: var(--dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      transition: all .12s
    }

    .lout:hover {
      border-color: var(--aborder);
      color: var(--accent)
    }

    /* Main */
    #main {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-overflow-scrolling: touch
    }

    .ph {
      padding: 16px 22px 12px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      gap: 12px
    }

    .ph-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -.01em;
      flex: 1
    }

    .ph-sub {
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 1px
    }

    #pb {
      flex: 1;
      overflow-y: auto;
      padding: 20px 22px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain
    }

    /* ─── COMPONENTS ─────────────────────────────────────────────── */
    .stats {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap
    }

    .sc {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 8px 12px;
      min-width: 110px
    }

    .sc-l {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--dim);
      margin-bottom: 3px
    }

    .sc-v {
      font-size: 18px;
      font-weight: 900;
      color: var(--text);
      line-height: 1
    }

    .sc.g {
      border-color: var(--gborder);
      background: var(--gsoft)
    }

    .sc.r {
      border-color: var(--aborder);
      background: var(--asoft)
    }

    .sc.b {
      border-color: rgba(26, 96, 200, .3);
      background: var(--bsoft)
    }

    .sc.y {
      border-color: var(--yborder);
      background: var(--ysoft)
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 13px;
      border: none;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: .03em;
      cursor: pointer;
      transition: all .12s;
      white-space: nowrap
    }

    .btn-r {
      background: var(--accent);
      color: #fff
    }

    .btn-r:hover {
      background: var(--accent2)
    }

    .btn-g {
      background: var(--green);
      color: #fff
    }

    .btn-g:hover {
      filter: brightness(1.1)
    }

    .btn-o {
      background: transparent;
      border: 1px solid var(--line2);
      color: var(--text)
    }

    .btn-o:hover {
      border-color: var(--line2);
      background: var(--panel2)
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--aborder);
      color: var(--accent)
    }

    .btn-ghost:hover {
      background: var(--asoft)
    }

    .btn:active,
    .gc:active {
      transform: scale(0.97);
    }

    .btn-sm {
      padding: 5px 9px;
      font-size: 11px
    }

    .btn-xs {
      padding: 3px 7px;
      font-size: 10px
    }

    /* Table */
    .tw {
      overflow-x: auto
    }

    table {
      width: 100%;
      border-collapse: collapse
    }

    th {
      text-align: left;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--dim);
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      font-weight: 600
    }

    td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      vertical-align: middle
    }

    tr:hover td {
      background: var(--panel2)
    }

    .td-main {
      font-weight: 600;
      color: var(--text)
    }

    .td-dim {
      color: var(--dim)
    }

    /* Badges */
    .bx {
      display: inline-block;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em
    }

    .bx-g {
      background: var(--gsoft);
      color: #3dd68c;
      border: 1px solid var(--gborder)
    }

    .bx-r {
      background: var(--asoft);
      color: #ff6b4a;
      border: 1px solid var(--aborder)
    }

    .bx-d {
      background: var(--panel2);
      color: var(--dim);
      border: 1px solid var(--line)
    }

    .eg-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--brd);
      border-radius: 8px;
      background: var(--panel2)
    }

    .bx-y {
      background: var(--ysoft);
      color: #e6a817;
      border: 1px solid var(--yborder)
    }

    .bx-b {
      background: var(--bsoft);
      color: #6ba3f5;
      border: 1px solid rgba(26, 96, 200, .3)
    }

    /* Toolbar */
    .bar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap
    }

    .bar input,
    .bar select {
      background: var(--panel);
      border: 1px solid var(--line2);
      padding: 7px 10px;
      color: var(--text);
      outline: none
    }

    .bar input:focus,
    .bar select:focus {
      border-color: var(--accent)
    }

    .bar input[type=search] {
      flex: 1;
      min-width: 180px;
      max-width: 260px
    }

    .sep {
      flex: 1
    }

    /* Breadcrumb */
    .bc {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 14px
    }

    .bc a {
      cursor: pointer;
      color: var(--dim)
    }

    .bc a:hover {
      color: var(--text)
    }

    .bc-sep {
      color: var(--dim2)
    }

    /* Group cards */
    .gcards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px
    }

    .gc {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 16px;
      cursor: pointer;
      transition: all .12s;
      border-top: 3px solid var(--accent)
    }

    .gc:hover {
      border-color: var(--aborder);
      background: var(--panel2)
    }

    .gc-city {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--accent);
      margin-bottom: 4px
    }

    .gc-name {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.2
    }

    .gc-meta {
      display: flex;
      gap: 14px;
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line)
    }

    .gc-sched {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.9;
      margin-bottom: 12px
    }

    .gc-sched strong {
      color: var(--text)
    }

    .gc-foot {
      display: flex;
      gap: 6px
    }

    /* Info blocks */
    .ib {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 14px 16px;
      margin-bottom: 12px
    }

    .ib h4 {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--dim);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line)
    }

    .ir {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--line);
      font-size: 12px
    }

    .ir:last-child {
      border: none
    }

    .ir-l {
      color: var(--dim)
    }

    .ir-v {
      font-weight: 700
    }

    .pg2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    /* Calendar */
    .cal-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px
    }

    .cal-title {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -.01em;
      flex: 1
    }

    .cal-nav button {
      padding: 5px 10px;
      background: var(--panel);
      border: 1px solid var(--line2);
      color: var(--text);
      font-size: 12px
    }

    .cal-nav button:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .cal-filt select {
      background: var(--panel);
      border: 1px solid var(--line2);
      padding: 6px 10px;
      color: var(--text);
      outline: none
    }

    .cgrid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--line)
    }

    .cgh {
      background: var(--bg);
      text-align: center;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--dim);
      padding: 7px 0
    }

    .cgc {
      background: var(--panel);
      min-height: 72px;
      padding: 5px 6px;
      position: relative
    }

    .cgc.other {
      background: var(--bg);
      opacity: .4
    }

    .cgc.today {
      background: var(--panel2)
    }

    .cgc.today .cgc-d {
      color: var(--accent);
      font-weight: 900
    }

    .cgc.clickable {
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0)
    }

    .cgc.clickable:active {
      background: var(--panel2)
    }

    .cgc.clickable:hover {
      background: var(--panel2)
    }

    .cgc-d {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 3px
    }

    .cpill {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 2px 5px;
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 2px;
      cursor: pointer;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
      border: none;
      border-radius: 0;
      background: none;
      text-align: left;
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      touch-action: manipulation;
      color: inherit;
      line-height: 1.4
    }

    .cpill-s {
      background: var(--gsoft);
      color: #3dd68c;
      border-left: 3px solid var(--green);
      font-weight: 800;
    }

    .cpill-s:hover,
    .cpill-s:active {
      background: rgba(26, 153, 82, .25)
    }

    .cpill-f {
      background: var(--ysoft);
      color: #e6a817;
      border-left: 2px solid var(--yellow)
    }

    .cpill-f:hover,
    .cpill-f:active {
      background: rgba(176, 128, 0, .25)
    }

    .cpill-p {
      background: var(--asoft);
      color: #ff6b4a;
      border-left: 2px solid var(--accent)
    }

    .cpill-p:hover {
      background: rgba(200, 35, 10, .25)
    }

    .cal-legend {
      display: flex;
      gap: 14px;
      margin-top: 12px;
      font-size: 10px;
      color: var(--dim)
    }

    .cal-legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px
    }

    .cal-legend em {
      display: inline-block;
      width: 10px;
      height: 10px;
      font-style: normal
    }

    /* Attendance */
    .att-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      max-height: calc(100vh - 280px);
      overflow-y: auto
    }

    .att-row {
      display: grid;
      grid-template-columns: 36px 1fr auto auto;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--panel);
      border-left: 2px solid transparent;
      transition: all .1s
    }

    .att-row:hover {
      background: var(--panel2)
    }

    .att-row.present {
      border-left-color: var(--green);
      background: var(--gsoft)
    }

    .att-row.absent {
      border-left-color: transparent
    }

    .att-chk {
      width: 24px;
      height: 24px;
      border: 2px solid var(--line2);
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .12s;
      font-size: 13px;
      font-weight: 900;
      flex-shrink: 0
    }

    .att-chk:hover {
      border-color: var(--green)
    }

    .att-chk.on {
      background: var(--green);
      border-color: var(--green);
      color: #fff
    }

    .att-name {
      font-weight: 600;
      font-size: 13px
    }

    .att-pay {
      font-size: 11px;
      color: var(--dim);
      text-align: right
    }

    .att-pay.late {
      color: #ff6b4a;
      font-weight: 600
    }

    /* Payment rows */
    .prow {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line)
    }

    .prow:hover {
      background: var(--panel2)
    }

    .prow-amt {
      font-weight: 800;
      font-size: 14px;
      min-width: 55px
    }

    .prow-dt {
      font-size: 11px;
      color: var(--dim);
      width: 80px
    }

    .prow-name {
      flex: 1;
      font-size: 12px
    }

    .prow-note {
      flex: 1;
      font-size: 11px;
      color: var(--dim);
      text-align: right
    }

    /* Modal */
    .mo {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .75);
      z-index: 200;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch
    }

    .md {
      background: var(--panel);
      border: 1px solid var(--line2);
      width: 100%;
      max-width: 440px;
      max-height: 90vh;
      overflow-y: auto
    }

    .md-h {
      padding: 15px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .md-title {
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em
    }

    .md-x {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 18px;
      cursor: pointer;
      padding: 0 2px
    }

    .md-x:hover {
      color: var(--text)
    }

    .md-b {
      padding: 18px
    }

    .md-f {
      padding: 12px 18px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 8px
    }

    .ff {
      margin-bottom: 13px
    }

    .ff label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--dim);
      margin-bottom: 5px
    }

    .ff input,
    .ff select {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--line2);
      padding: 9px 10px;
      color: var(--text);
      outline: none
    }

    .ff input:focus,
    .ff select:focus {
      border-color: var(--accent)
    }

    .ff2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    /* Misc */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--dim);
      font-size: 13px
    }

    .loading {

  <script>
    'use strict';
    const $ = id => document.getElementById(id);
    const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

    // ── DATE FIX ─────────────────────────────────────────────────
    // Handles both "2025-09-30" and "2025-09-30T00:00:00.000Z"
    function fd(v) {
      if (!v) return '—';
      const s = String(v).substring(0, 10); // always take YYYY-MM-DD part
      if (!s.match(/^\d{4}-\d{2}-\d{2}$/)) return String(v);
      const [y, m, d] = s.split('-');
      return `${d}.${m}.${y}`;
    }
    function toISO(d) {
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
    function todayISO() { return toISO(new Date()); }
    function normISO(v) { return String(v || '').substring(0, 10); } // normalize any date value to YYYY-MM-DD
    function daysAgo(v) { if (!v) return null; return Math.floor((Date.now() - new Date(normISO(v))) / 86400000); }
    // Zwraca true=opłacony, false=nieopłacony, null=brak danych
    function paidStatus(paid_until, last_payment) {
      if (paid_until) return normISO(paid_until) >= todayISO();
      if (!last_payment) return null;
      return daysAgo(last_payment) <= 35;
    }
    // Ostatni dzień miesiąca za N miesięcy od dziś
    function endOfMonthPlus(months) {
      const d = new Date();
      d.setMonth(d.getMonth() + months + 1, 0);
      return toISO(d);
    }
    const MONTHS = ['Styczeń', 'Luty', 'Marzec', 'Kwiecień', 'Maj', 'Czerwiec', 'Lipiec', 'Sierpień', 'Wrzesień', 'Październik', 'Listopad', 'Grudzień'];
    const DAYS_SHORT = ['Pon', 'Wt', 'Śr', 'Czw', 'Pt', 'Sob', 'Ndz'];
    const DAYS_FULL = ['Poniedziałek', 'Wtorek', 'Środa', 'Czwartek', 'Piątek', 'Sobota', 'Niedziela'];
    const SEASON = '2025-09-01';

    // ── STATE ─────────────────────────────────────────────────────
    const S = {
      token: null, inst: null, perms: {},
      groups: [], sessions: [], payments: [],
      page: 'dash',
      calY: new Date().getFullYear(), calM: new Date().getMonth(), calGid: null,
      sessGid: '', sessFrom: SEASON,
      grpId: null, grpStudents: [],
      sessId: null, sessData: null,
      studId: null, studData: null,
    };

    // ── API ───────────────────────────────────────────────────────
    async function api(url, method = 'GET', body = null) {
      const h = { 'Content-Type': 'application/json' };
      if (S.token) h['Authorization'] = 'Bearer ' + S.token;
      const r = await fetch(url, { method, headers: h, body: body ? JSON.stringify(body) : null });
      if (!r.ok) {
        let msg = 'Błąd ' + r.status;
        try { const d = await r.json(); msg = d.error || msg; } catch (e) { }
        throw new Error(msg);
      }
      const ct = r.headers.get('content-type') || '';
      return ct.includes('json') ? r.json() : {};
    }

    // ── AUTH ──────────────────────────────────────────────────────
    async function login() {
      const u = $('li-u').value.trim(), p = $('li-p').value;
      const err = $('li-e'); err.classList.remove('show');
      if (!u || !p) { err.textContent = 'Podaj login i hasło.'; err.classList.add('show'); return; }
      try {
        const d = await api('/api/instructor/login', 'POST', { username: u, password: p });
        setAuth(d.token, d.instructor, d.permissions || {});
        $('pg-login').style.display = 'none';
        $('app').classList.add('on');
        await loadAll();
      } catch (e) { err.textContent = e.message; err.classList.add('show'); }
    }
    function setAuth(tok, inst, perms) {
      S.token = tok; S.inst = inst; S.perms = perms || {};
      localStorage.setItem('it', tok);
      localStorage.setItem('ii', JSON.stringify(inst));
      localStorage.setItem('ip', JSON.stringify(S.perms));
      $('sb-name').textContent = (inst.first_name || '') + ' ' + (inst.last_name || '');
      applyPermNav();
      showMobileBars(true);
    }
    function applyPermNav() {
      // Ukryj zakładki na podstawie uprawnień
      const payNav = document.getElementById('ni-pays');
      if (payNav) payNav.style.display = S.perms.can_see_payments ? '' : 'none';
      const payBn = document.getElementById('bn-pays');
      if (payBn) payBn.style.display = S.perms.can_see_payments ? '' : 'none';

      // Pokaż zarządzanie sesjami instruktorów (tylko dla can_assign_instructors)
      const smgmtNav = document.getElementById('ni-smgmt');
      if (smgmtNav) smgmtNav.style.display = S.perms.can_assign_instructors ? '' : 'none';

      // Jeśli can_see_groups=false — ukryj "Grupy & Kursanci" z nav (dostęp tylko z dashboardu w dniu zajęć)
      const grpNav = document.getElementById('ni-groups');
      if (grpNav) grpNav.style.display = S.perms.can_see_groups ? '' : 'none';
      const grpBn = document.getElementById('bn-groups');
      if (grpBn) grpBn.style.display = S.perms.can_see_groups ? '' : 'none';
    }
    function logout() {
      S.token = null; S.inst = null;
      localStorage.removeItem('it'); localStorage.removeItem('ii');
      $('app').classList.remove('on');
      $('pg-login').style.display = 'flex';
      showMobileBars(false);
    }
    function showMobileBars(show) {
      // Pokazuj tylko na mobile (<=768px)
      const isMobile = window.innerWidth <= 768;
      const d = (show && isMobile) ? 'flex' : 'none';
      $('mob-bar').style.display = d;
      $('bot-nav').style.display = d;
    }
    function toggleSb() {
      const sb = $('sb'), ov = $('sb-overlay');
      const open = sb.style.display === 'flex';
      if (open) { sb.style.display = 'none'; ov.style.display = 'none'; }
      else {
        sb.style.cssText = 'display:flex;position:fixed;top:0;bottom:0;left:0;z-index:999;width:220px';
        ov.style.display = 'block';
      }
    }
    function closeSb() {
      $('sb').style.cssText = '';
      $('sb-overlay').style.display = 'none';
    }

    // ── LOAD ──────────────────────────────────────────────────────
    async function loadAll() {
      try {
        const d = await api('/api/instructor/groups');
        S.groups = d.rows || [];
        // Zaktualizuj uprawnienia z odpowiedzi
        if (d.permissions) { S.perms = d.permissions; applyPermNav(); }
      }
      catch (e) { console.error(e); }
      render('dash');
    }

    // ── NAVIGATION ────────────────────────────────────────────────
    function goMenu(page) {
      if (S.page === 'sess' && S.sessId && S._attRequired) {
        const presNow = S._attStudents ? S._attStudents.filter(s => document.getElementById('chk-' + s.student_id)?.classList.contains('on')).length : 0;
        if (presNow === 0) {
          if (!confirm('Nie zaznaczono żadnych obecności. Czy na pewno chcesz wyjść bez zapisu?')) return;
        }
        S._attRequired = false;
        S.sessId = null;
      }
      go(page);
    }

    function go(page) {
      document.querySelectorAll('.ni').forEach(el => el.classList.remove('on'));
      document.querySelectorAll('.bn').forEach(el => el.classList.remove('on'));
      const n = $('ni-' + page); if (n) n.classList.add('on');
      const bn = $('bn-' + page); if (bn) bn.classList.add('on');
      S.page = page;
      if (page === 'groups') { S.grpId = null; S.studId = null; }
      closeSb();

    function render(page) {
      const titles = { dash: 'Dashboard', groups: 'Grupy & Kursanci', cal: 'Kalendarz zajęć', sess: 'Sesje & Obecności', pays: 'Płatności', smgmt: 'Sesje instruktorów' };

      $('ph-s').textContent = '';

        case 'cal': renderCal(); break;
        case 'sess':
          if (S.sessId) renderAtt();

        case 'smgmt': renderSessMgmt(); break;

    function renderCal() {

    function calNav(dir) {
      S.calM += dir;

    }

    function fillCalGrid(y, m, sessions) {
      const grid = $('cgrid'); if (!grid) return;
      // remove cells (keep 7 headers)
      while (grid.children.length > 7) grid.removeChild(grid.lastChild);

      const today = todayISO();
      const firstDow = new Date(y, m, 1).getDay(); // 0=Sun
      const offset = firstDow === 0 ? 6 : firstDow - 1; // Mon=0
      const daysInM = new Date(y, m + 1, 0).getDate();
      const prevDays = new Date(y, m, 0).getDate();

      // Build session map: normalized "YYYY-MM-DD" → sessions[]
      const smap = {};
      sessions.forEach(s => {
        const k = normISO(s.session_date);
        if (!smap[k]) smap[k] = [];
        smap[k].push(s);
      });

      // Build scheduled days map from group schedules
      const groups = S.calGid ? S.groups.filter(g => g.id == S.calGid) : S.groups;
      const schedMap = {}; // "YYYY-MM-DD" → [{group, sched}]
      groups.forEach(g => {
        const seenDow = new Set();
        (g.schedules || []).filter(s => { const k = `${s.day_of_week}|${(s.time_label || String(s.time_start || '')).slice(0, 5)}`; if (seenDow.has(k)) return false; seenDow.add(k); return true; }).forEach(sch => {
          const dow = Number(sch.day_of_week);
          for (let d = 1; d <= daysInM; d++) {
            const date = new Date(y, m, d);
            const wd = date.getDay() === 0 ? 6 : date.getDay() - 1;
            if (wd === dow - 1) {  // DB: 1=Mon ISO; wd: 0=Mon JS
              const iso = toISO(date);
              if (!schedMap[iso]) schedMap[iso] = [];
              schedMap[iso].push({ group: g, sched: sch });
            }
          }
        });
      });

      // Prev month padding
      for (let i = 0; i < offset; i++) {
        const c = document.createElement('div');
        c.className = 'cgc other';
        c.innerHTML = `<div class="cgc-d">${prevDays - offset + i + 1}</div>`;
        grid.appendChild(c);
      }

      for (let d = 1; d <= daysInM; d++) {
        const iso = toISO(new Date(y, m, d));
        const hasSess = !!smap[iso];
        const hasSched = !!schedMap[iso] && !hasSess;
        const isToday = iso === today;
        const c = document.createElement('div');
        const cls = ['cgc'];
        if (isToday) cls.push('today');
        if (hasSess || hasSched) cls.push('clickable');
        else cls.push('other'); // Oznaczamy puste dni jako 'other', żeby mobilny CSS je ukrył.
        c.className = cls.join(' ');

        let html = `<div class="cgc-d">${d}</div>`;
        // Sortuj sesje po czasie rozpoczęcia
        const sortedSess = (smap[iso] || []).slice().sort((a, b) => {
          const ga = S.groups.find(x => x.id == a.group_id);
          const gb = S.groups.find(x => x.id == b.group_id);
          const ta = (ga?.schedules || [])[0]?.time_start || '99:99';
          const tb = (gb?.schedules || [])[0]?.time_start || '99:99';
          return String(ta).localeCompare(String(tb));
        });
        if (hasSess) {
          sortedSess.forEach(s => {
            const isFuture = normISO(s.session_date) > todayISO();
            const gname = (s.group_name || "").replace("2025/2026", "25/26").replace(" - ", "—");
            const pillCls = isFuture ? "cpill-f" : "cpill-s";
            const pillIco = isFuture ? "⏳" : "✓";
            html += `<span class="cpill ${pillCls}" onclick="openSessFromCal(${s.session_id},${s.group_id},'${normISO(s.session_date)}','${esc(s.group_name || '')}')" ontouchend="event.preventDefault();openSessFromCal(${s.session_id},${s.group_id},'${normISO(s.session_date)}','${esc(s.group_name || '')}')">${pillIco} ${esc(gname)} (${s.present_count || 0}/${s.total_marked || 0})</span>`;
          });
        }
        if (hasSched) {
          // Sortuj zaplanowane zajęcia po godzinie (time_start)
          const sortedSched = (schedMap[iso] || []).slice().sort((a, b) =>
            String(a.sched.time_start || '99:99').localeCompare(String(b.sched.time_start || '99:99'))
          );
          sortedSched.forEach(({ group: g, sched: sch }) => {
            const gname = g.name.replace('2025/2026', '25/26').replace(' - ', '—');
            html += `<span class="cpill cpill-f" onclick="createSess(${g.id},'${iso}')" ontouchend="event.preventDefault();createSess(${g.id},'${iso}')">+ ${esc(gname)} ${sch.time_label || ''}</span>`;
          });
        }
        c.innerHTML = html;
        grid.appendChild(c);
      }

      // Next month padding
      const total = offset + daysInM;
      const rem = (7 - total % 7) % 7;
      for (let i = 1; i <= rem; i++) {
        const c = document.createElement('div');
        c.className = 'cgc other';
        c.innerHTML = `<div class="cgc-d">${i}</div>`;
        grid.appendChild(c);
      }

      // Auto-scroll do dziś jeśli widoczny w bieżącym miesiącu
      const todayCell = grid.querySelector('.cgc.today');
      if (todayCell) {
        setTimeout(() => todayCell.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
      }
    }

    async function createSess(gid, date) {
      if (!confirm(`Otworzyć sesję treningową:\n${S.groups.find(x => x.id == gid)?.name || ''}\n${fd(date)}?`)) return;
      try {
        const d = await api('/api/instructor/sessions', 'POST', { group_id: gid, session_date: date });
        openSessFromCal(d.id, gid, date, S.groups.find(x => x.id == gid)?.name || '');
      } catch (e) { alert('Błąd: ' + e.message); }
    }

    function openSessFromCal(sessId, gid, date, name) {
      S.sessId = sessId;
      S.sessData = { session_id: sessId, group_id: gid, session_date: date, group_name: name };
      document.querySelectorAll(".ni").forEach(el => el.classList.remove("on"));
      const n = document.getElementById("ni-sess"); if (n) n.classList.add("on");
      // Zaktualizuj zakładki mobilne (bot-nav)
      document.querySelectorAll(".bn").forEach(el => el.classList.remove("on"));
      const b = document.getElementById("bn-sess"); if (b) b.classList.add("on");
      S.page = "sess";
      renderAtt();
    }

    async function quickSess(gid) {
      // Znajdź grupę i spróbuj wejść od razu w dzisiejszą sesję lub wykreuj nową.
      const date = todayISO();
      $('pb').innerHTML = '<div class="loading">Ładowanie sesji...</div>';
      try {
        // Sprawdźmy czy jest dzisiaj już jakaś sesja dla tej grupy
        const url = `/api/instructor/sessions?from=${date}&group_id=${gid}`;
        const d = await api(url);
        const todaySess = (d.rows || []).find(s => normISO(s.session_date) === date);
        if (todaySess) {
          openSessFromCal(todaySess.session_id, gid, date, todaySess.group_name || '');
        } else {
          // Jeśli sesja nie istnieje, stwórz nową w tle bez pytania użytkownika ("Skrót")
          const groupName = S.groups.find(x => x.id == gid)?.name || '';
          const res = await api('/api/instructor/sessions', 'POST', { group_id: gid, session_date: date });
          openSessFromCal(res.id, gid, date, groupName);
        }
      } catch (e) {
        alert('Błąd otwierania sesji: ' + e.message);
        renderDash();
      }
    }

        });

        const anyMarked = pres > 0 || st.some(s => s.present === false && s._touched);

        const instAssignSection = S.perms.can_assign_instructors ? `

            <span class="ir-l" style="font-size:12px">Prowadzący sesję</span>
            <span class="ir-v">

                <option value="">— brak przypisania —</option>${instOpts}

            </span>

        $('pb').innerHTML = `
      <div class="bc">
        <button class="btn btn-ghost btn-sm" onclick="tryLeaveSess()" style="margin-right:8px;padding:4px 8px">← Wróć</button>
        <a onclick="tryLeaveSess()" style="cursor:pointer">Sesje</a><span class="bc-sep">›</span>
        <span>${esc(sess.group_name || '')} — ${dateStr}</span>
      </div>
      ${instAssignSection}
      <div class="stats" style="margin-bottom:14px">

            <div style="font-size:10px;font-weight:700;letter-spacing:0.02em;color:var(--dim);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">

              ${S.perms.can_accept_payment ? `<button class="btn btn-xs" style="padding:2px 7px;font-size:10px;border:1px solid var(--line2);color:var(--dim);background:var(--panel2)" onclick="event.stopPropagation();moPaidUntil(${s.student_id},${sess.group_id},'${s.paid_until || ''}')">✎</button>` : ''}
            </div>` : '';

          const profBtn = `<button class="btn btn-o" onclick="event.stopPropagation();openStud(${s.student_id})" style="padding:6px 10px;font-size:10px;flex:1;max-width:100px;text-align:center;">Kartoteka</button>`;

    function tryLeaveSess() {
      // Sprawdź czy zaznaczono obecność
      if (S._attRequired) {
        const presNow = S._attStudents ? S._attStudents.filter(s => document.getElementById('chk-' + s.student_id)?.classList.contains('on')).length : 0;
        if (presNow === 0) {
          if (!confirm('Nie zaznaczono żadnych obecności. Czy na pewno chcesz wyjść bez zapisu?')) return;
        }
      }
      S.sessId = null; S._attRequired = false; S._attStudents = null;
      renderSess();
    }

    function confirmAttDone() {
      const presNow = S._attStudents ? S._attStudents.filter(s => document.getElementById('chk-' + s.student_id)?.classList.contains('on')).length : 0;
      if (presNow === 0 && S._attStudents && S._attStudents.length > 0) {
        if (!confirm('Nie zaznaczono żadnych obecności. Zapisać mimo to?')) return;
      }
      S.sessId = null; S._attRequired = false; S._attStudents = null;
      renderSess();
    }

    async function toggleAttRow(event, sessId, studId) {
      if (event && event.target.tagName === 'BUTTON') return;
      const el = document.getElementById('chk-' + studId);
      if (el) toggleAtt(sessId, studId, el);
    }

    async function toggleAtt(sessId, studId, el) {
      if (!S.perms.can_mark_attendance) { alert('Brak uprawnień do oznaczania obecności.'); return; }
      const wasOn = el.classList.contains('on');
      const now = !wasOn;
      el.classList.toggle('on', now);
      el.textContent = now ? '✓' : '';
      const row = $(`atr-${studId}`);
      if (row) { row.classList.toggle('present', now); row.classList.toggle('absent', !now); }
      try { await api(`/api/instructor/sessions/${sessId}/attendance`, 'POST', { student_id: studId, present: now }); }
      catch (e) {
        el.classList.toggle('on', wasOn); el.textContent = wasOn ? '✓' : '';
        if (row) { row.classList.toggle('present', wasOn); row.classList.toggle('absent', !wasOn); }
        alert('Błąd zapisu: ' + e.message);
      }
    }

    async function markAll(present) {
      const sess = S.sessData;
      for (const el of document.querySelectorAll('.att-chk')) {
        const sid = Number(el.id.replace('chk-', ''));
        el.classList.toggle('on', present); el.textContent = present ? '✓' : '';
        const row = $(`atr-${sid}`);
        if (row) { row.classList.toggle('present', present); row.classList.toggle('absent', !present); }
        await api(`/api/instructor/sessions/${sess.session_id}/attendance`, 'POST', { student_id: sid, present }).catch(() => { });
      }
    }

      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px">
        <div class="ff" style="min-width:200px">
          <label style="font-size:11px;color:var(--dim);display:block;margin-bottom:4px">Instruktor</label>
          <select id="sm-inst" onchange="smSelectInst(this.value)">
            <option value="">— wybierz instruktora —</option>${instOpts}
          </select>
        </div>
        <div class="ff" style="min-width:200px">
          <label style="font-size:11px;color:var(--dim);display:block;margin-bottom:4px">Grupa</label>
          <select id="sm-grp" onchange="smSelectGrp(this.value)" ${SM.instId ? '' : 'disabled'}>
            ${grpOpts}
          </select>
        </div>
        <div style="display:flex;gap:6px;align-items:flex-end">
          <button class="btn btn-o btn-sm" onclick="smNav(-1)">◀</button>
          <span id="sm-month-lbl" style="font-size:13px;font-weight:700;min-width:130px;text-align:center">${MONTHS[SM.m]} ${SM.y}</span>
          <button class="btn btn-o btn-sm" onclick="smNav(1)">▶</button>
        </div>
      </div>
      <div id="sm-cal">${SM.gid ? '' : '<div class="empty">Wybierz instruktora i grupę aby zobaczyć kalendarz sesji.</div>'}</div>`;

      if (SM.gid) await smLoadCal();
    }

    function smSelectInst(instId) {
      SM.instId = instId || null;
      SM.gid = null;
      renderSessMgmt();
    }

    function smSelectGrp(gid) {
      SM.gid = gid || null;
      smLoadCal();
    }

    async function smLoadCal() {
      const gid = SM.gid;
      const cal = document.getElementById('sm-cal');
      if (!gid || !cal) return;
      const y = SM.y, m = SM.m;
      const from = `${y}-${String(m+1).padStart(2,'0')}-01`;
      const lastD = new Date(y, m+1, 0).getDate();
      const to = `${y}-${String(m+1).padStart(2,'0')}-${String(lastD).padStart(2,'0')}`;
      try {
        const d = await api(`/api/instructor/session-mgmt/sessions?group_id=${gid}&from=${from}&to=${to}`);
        smRenderCal(y, m, gid, d.rows || []);
      } catch(e) { cal.innerHTML = `<div class="empty">Błąd: ${esc(e.message)}</div>`; }
    }

    function smRenderCal(y, m, gid, sessions) {
      const smap = {};
      sessions.forEach(s => { smap[s.session_date] = s; });
      const today = todayISO();
      const firstDow = new Date(y, m, 1).getDay();
      const offset = firstDow === 0 ? 6 : firstDow - 1;
      const daysInM = new Date(y, m+1, 0).getDate();

      let html = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;max-width:560px">`;
      DAYS_SHORT.forEach(d => { html += `<div style="text-align:center;font-size:10px;font-weight:700;color:var(--dim);padding:4px 0">${d}</div>`; });
      for (let i = 0; i < offset; i++) html += `<div style="min-height:52px"></div>`;

      for (let d = 1; d <= daysInM; d++) {
        const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const sess = smap[iso];
        const isToday = iso === today;
        if (sess) {
          html += `<div onclick="smDeleteSess(${sess.session_id},'${iso}',${gid})"
            style="background:var(--gsoft);border:1px solid var(--gborder);border-radius:6px;min-height:52px;padding:6px;cursor:pointer;text-align:center">
            <div style="font-weight:700;font-size:13px;color:#3dd68c">${d}</div>
            <div style="font-size:9px;color:rgba(61,214,140,.7)">✓ sesja</div>
            <div style="font-size:9px;color:var(--dim)">${sess.present_count}/${sess.total_marked}</div>
          </div>`;
        } else {
          html += `<div onclick="smCreateSess('${iso}',${gid})"
            style="background:${isToday ? 'var(--asoft)' : 'var(--panel2)'};border:1px solid ${isToday ? 'var(--aborder)' : 'var(--line)'};border-radius:6px;min-height:52px;padding:6px;cursor:pointer;text-align:center">
            <div style="font-weight:700;font-size:13px;color:${isToday ? 'var(--accent2)' : 'var(--text)'}">${d}</div>
            <div style="font-size:9px;color:var(--dim2)">+ dodaj</div>
          </div>`;
        }
      }
      html += `</div>
      <div style="margin-top:10px;font-size:11px;color:var(--dim)">Kliknij zielony dzień aby usunąć sesję. Kliknij pusty dzień aby dodać.</div>`;
      const cal = document.getElementById('sm-cal');
      if (cal) cal.innerHTML = html;
    }

    async function smCreateSess(date, gid) {
      if (!confirm(`Dodać sesję treningową na ${date}?`)) return;
      try {
        await api('/api/instructor/session-mgmt/sessions', 'POST', { group_id: parseInt(gid), session_date: date });
        await smLoadCal();
      } catch(e) { alert('Błąd: ' + e.message); }
    }

    async function smDeleteSess(sid, date, gid) {
      if (!confirm(`Usunąć sesję z dnia ${date}?\nWszystkie zapisane obecności zostaną skasowane.`)) return;
      try {
        await api(`/api/instructor/session-mgmt/sessions/${sid}`, 'DELETE');
        await smLoadCal();
      } catch(e) { alert('Błąd: ' + e.message); }
    }

    function smNav(dir) {
      SM.m += dir;
      if (SM.m < 0) { SM.m = 11; SM.y--; }
      if (SM.m > 11) { SM.m = 0; SM.y++; }
      const lbl = document.getElementById('sm-month-lbl');
      if (lbl) lbl.textContent = MONTHS[SM.m] + ' ' + SM.y;
      smLoadCal();
    }

    // ── PRZYJMIJ PŁATNOŚĆ (instruktor) ────────────────────────────
    function moAcceptPayment(studentId, studentName, groupId) {
      showMo('💰 Przyjmij wpłatę', `
        <div style="font-size:13px;color:var(--dim);margin-bottom:16px">Kursant: <strong style="color:var(--text)">${studentName}</strong></div>
        <div class="ff" style="margin-bottom:12px">
          <label>Kwota (zł) *</label>
          <input id="pay-amount" type="number" min="1" max="9999" step="1" placeholder="100">
        </div>
        <div class="ff">
          <label>Notatka (opcjonalnie)</label>
          <input id="pay-note" placeholder="np. gotówka">
        </div>
        <div id="pay-err" class="lerr" style="display:none"></div>`,
        `<button class="btn btn-o" onclick="closeMo()">Anuluj</button>
         <button class="btn btn-g" onclick="doAcceptPayment(${studentId},${groupId || 'null'})">Zapisz wpłatę</button>`);
      setTimeout(() => document.getElementById('pay-amount')?.focus(), 50);
    }

    async function doAcceptPayment(studentId, groupId) {
      const amount = parseFloat(document.getElementById('pay-amount')?.value);
      const note = document.getElementById('pay-note')?.value?.trim();
      const errEl = document.getElementById('pay-err');
      if (!amount || amount <= 0) { errEl.textContent = 'Podaj prawidłową kwotę.'; errEl.style.display = 'block'; return; }
      try {
        await api('/api/instructor/accept-payment', 'POST', { student_id: studentId, amount, note: note || null, group_id: groupId || null });
        closeMo();
        if (S.sessId) renderAtt();
        else openStud(studentId);
      } catch (e) { errEl.textContent = e.message; errEl.classList.add('show'); }
    }

    // ── PRZYPISZ INSTRUKTORA DO SESJI ────────────────────────────
    async function assignSessInstructor(sessId) {
      const instId = document.getElementById('sess-inst-sel')?.value || null;
      try {
        await api(`/api/instructor/sessions/${sessId}`, 'PATCH', { instructor_id: instId ? parseInt(instId) : null });
        if (S.sessData) S.sessData.instructor_id = instId ? parseInt(instId) : null;
      } catch (e) { alert('Błąd przypisania instruktora: ' + e.message); }
    }

    // ── USTAW OPŁACONY DO ─────────────────────────────────────────
    function moPaidUntil(studentId, groupId, currentPaidUntil) {
      showMo('OPŁACONY DO', `
        <div style="font-size:12px;color:var(--dim);margin-bottom:12px">Ustaw do kiedy kursant jest opłacony w tej grupie.</div>
        <div class="ff">
          <label>Data ważności (koniec miesiąca)</label>
          <input type="date" id="pu-date" value="${currentPaidUntil || ''}">
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <button class="btn btn-o btn-sm" onclick="document.getElementById('pu-date').value='${endOfMonthPlus(3)}'">+3 miesiące</button>
          <button class="btn btn-o btn-sm" onclick="document.getElementById('pu-date').value='${endOfMonthPlus(6)}'">+6 miesięcy</button>
          <button class="btn btn-o btn-sm" onclick="document.getElementById('pu-date').value='${endOfMonthPlus(12)}'">+12 miesięcy</button>
          <button class="btn btn-o btn-sm" onclick="document.getElementById('pu-date').value=''">Wyczyść</button>
        </div>
        <div id="pu-err" class="lerr" style="display:none"></div>`,
        `<button class="btn btn-o" onclick="closeMo()">Anuluj</button>
         <button class="btn btn-g" onclick="doPaidUntil(${studentId},${groupId})">Zapisz</button>`);
    }
    async function doPaidUntil(studentId, groupId) {
      const dateVal = document.getElementById('pu-date')?.value || null;
      const errEl = document.getElementById('pu-err');
      try {
        await api('/api/instructor/student-groups/paid-until', 'PATCH',
          { student_id: studentId, group_id: groupId, paid_until: dateVal || null });
        closeMo();
        if (S.sessId) renderAtt();
        else openGrp(S.grpId);
      } catch (e) { errEl.textContent = e.message; errEl.style.display = 'block'; }
    }

    function moAddStud(gid) {
      const opts = S.groups.map(g => `<option value="${g.id}" ${g.id == gid ? 'selected' : ''}>${esc(g.location_city)} — ${esc(g.name)}</option>`).join('');
      showMo('DODAJ KURSANTA', `
    <div class="ff2">
      <div class="ff"><label>Imię *</label><input id="a-fn"></div>
      <div class="ff"><label>Nazwisko *</label><input id="a-ln"></div>
    </div>
    <div class="ff2">
      <div class="ff"><label>Telefon</label><input id="a-ph"></div>
      <div class="ff"><label>E-mail</label><input id="a-em" type="text" inputmode="email" autocomplete="email"></div>
    </div>
    <div class="ff2">
      <div class="ff"><label>Rok urodzenia</label><input id="a-by" type="number" min="1950" max="2020"></div>
      <div class="ff"><label>Przypisz do grupy</label><select id="a-gp">${opts}</select></div>
    </div>`,
        `<button class="btn btn-o" onclick="closeMo()">Anuluj</button>
     <button class="btn btn-r" onclick="doAddStud()">Dodaj</button>`);
    }
    async function doAddStud() {
      const fn = $('a-fn').value.trim(), ln = $('a-ln').value.trim();
      if (!fn || !ln) { alert('Imię i nazwisko są wymagane.'); return; }
      try {
        await api('/api/instructor/students', 'POST', {
          first_name: fn, last_name: ln,
          phone: $('a-ph').value.trim() || null,
          email: $('a-em').value.trim() || null,
          birth_year: $('a-by').value || null,
          group_id: $('a-gp').value || null
        });
        closeMo();
        openGrp(S.grpId);
      } catch (e) { alert('Błąd: ' + e.message); }
    }

    async function moEditStud() {
      const s = S.studData;
      // Pobierz grupy instruktora z info czy kursant jest w każdej
      let grpRows = [];
      try { const d = await api(`/api/instructor/students/${s.id}/groups`); grpRows = d.rows || []; }
      catch (e) { console.warn('Błąd ładowania grup:', e); }
      S._editGrpRows = grpRows;

      // Grupy w których kursant jest aktywny
      const activeGrps = grpRows.filter(g => g.student_active);
      // Lista grup do wyboru przy przeniesieniu
      const grpOpts = grpRows.map(g => `<option value="${g.id}">${esc(g.location_city)} — ${esc(g.name)}</option>`).join('');

      // Sekcja grup — każda aktywna z przyciskiem przenieś + usuń
      const grpRows_html = activeGrps.length === 0
        ? `<div style="color:var(--dim);font-size:.85rem;padding:6px 0">Kursant nie jest przypisany do żadnej grupy.</div>`
        : activeGrps.map(g => `
      <div class="eg-row" id="egr-${g.id}">
        <span class="bx bx-g" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(g.location_city)} — ${esc(g.name)}</span>
        <button class="btn btn-xs btn-o" onclick="moMoveStud(${s.id},${g.id},'${esc(g.name)}')">Przenieś →</button>
        <button class="btn btn-xs btn-ghost" onclick="doRemoveFromGroup(${s.id},${g.id},this)" title="Usuń z grupy">✕</button>
      </div>`).join('');

      // Dodaj do dodatkowej grupy (nie wychodząc z aktualnej)
      const addableGrps = grpRows.filter(g => !g.student_active);
      const addOpts = addableGrps.map(g => `<option value="${g.id}">${esc(g.location_city)} — ${esc(g.name)}</option>`).join('');

      showMo('EDYTUJ KURSANTA', `
    <div class="ff2">
      <div class="ff"><label>Imię *</label><input id="e-fn" value="${esc(s.first_name || '')}"></div>
      <div class="ff"><label>Nazwisko *</label><input id="e-ln" value="${esc(s.last_name || '')}"></div>
    </div>
    <div class="ff2">
      <div class="ff"><label>Telefon</label><input id="e-ph" value="${esc(s.phone || '')}"></div>
      <div class="ff"><label>E-mail</label><input id="e-em" value="${esc(s.email || '')}"></div>
    </div>
    <div class="ff"><label>Rok urodzenia</label><input id="e-by" type="number" value="${s.birth_year || ''}"></div>
    <div style="margin-top:18px;border-top:1px solid var(--brd);padding-top:14px">
      <div class="section-hd" style="margin-bottom:10px">GRUPY KURSANTA</div>
      <div id="eg-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">
        ${grpRows_html}
      </div>
      ${addableGrps.length > 0 ? `
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select id="e-add-gp" style="flex:1;min-width:150px">
          <option value="">— dodaj do grupy —</option>
          ${addOpts}
        </select>
        <button class="btn btn-g btn-sm" onclick="doAddToGroup(${s.id})">+ Dodaj</button>
      </div>`: ''}
    </div>`,
        `<button class="btn btn-o" onclick="closeMo()">Anuluj</button>
     <button class="btn btn-r" onclick="doEditStud(${s.id})">Zapisz dane</button>`);
    }

    // Przenieś kursanta do innej grupy (modal w modalu)
    function moMoveStud(sid, fromGid, fromName) {
      // Pobierz grupy do których można przenieść (wszystkie instruktora oprócz aktualnej)
      const availGroups = (S._editGrpRows || []).filter(g => g.id !== fromGid);
      if (!availGroups.length) { alert('Brak innych grup do których można przenieść.'); return; }
      const opts = availGroups.map(g => `<option value="${g.id}">${esc(g.location_city)} — ${esc(g.name)}</option>`).join('');
      showMo('PRZENIEŚ DO INNEJ GRUPY', `
    <p style="margin:0 0 14px;color:var(--dim)">Kursant zostanie <strong>usunięty z: ${esc(fromName)}</strong> i dodany do wybranej grupy.</p>
    <div class="ff"><label>Przenieś do grupy</label>
      <select id="mv-gp">${opts}</select>
    </div>`,
        `<button class="btn btn-o" onclick="moEditStud()">← Wróć</button>
     <button class="btn btn-r" onclick="doMoveStud(${sid},${fromGid})">Przenieś</button>`);
    }

    async function doMoveStud(sid, fromGid) {
      const toGid = $('mv-gp').value;
      if (!toGid) { alert('Wybierz grupę docelową.'); return; }
      try {
        await api(`/api/instructor/students/${sid}/groups`, 'POST', {
          group_id: Number(toGid), action: 'move', from_group_id: fromGid
        });
        closeMo();
        // Odśwież listę — wróć do grupy z której przenosiliśmy lub do kursanta
        if (S.grpId === fromGid) { openGrp(Number(toGid)); }
        else { openStud(sid); }
      } catch (e) { alert('Błąd: ' + e.message); }
    }

    async function doRemoveFromGroup(sid, gid, btn) {
      if (!confirm('Usunąć kursanta z tej grupy?')) return;
      try {
        await api(`/api/instructor/students/${sid}/groups`, 'POST', {
          group_id: gid, action: 'remove'
        });
        // Usuń wiersz z UI bez zamykania modala
        const row = document.getElementById('egr-' + gid);
        if (row) row.remove();
      } catch (e) { alert('Błąd: ' + e.message); }
    }

    async function doAddToGroup(sid) {
      const gid = $('e-add-gp').value;
      if (!gid) { alert('Wybierz grupę.'); return; }
      try {
        await api(`/api/instructor/students/${sid}/groups`, 'POST', {
          group_id: Number(gid), action: 'add'
        });
        closeMo();
        openStud(sid);
      } catch (e) { alert('Błąd: ' + e.message); }
    }

    async function doEditStud(id) {
      const fn = $('e-fn').value.trim(), ln = $('e-ln').value.trim();
      if (!fn || !ln) { alert('Imię i nazwisko są wymagane.'); return; }
      try {
        await api(`/api/instructor/students/${id}`, 'PATCH', {
          first_name: fn, last_name: ln,
          phone: $('e-ph').value.trim() || null,
          email: $('e-em').value.trim() || null,
          birth_year: $('e-by').value || null
        });
        closeMo();
        openStud(id);
      } catch (e) { alert('Błąd: ' + e.message); }
    }

    async function doDelStud(id) {
      if (!confirm('Usunąć kursanta? Jeśli ma płatności lub obecności — zostanie oznaczony jako nieaktywny.')) return;
      try {
        const d = await api(`/api/instructor/students/${id}`, 'DELETE');
        if (d.soft) alert('Kursant ma historię — oznaczony jako nieaktywny.');
        S.studId = null;
        openGrp(S.grpId);
      } catch (e) { alert('Błąd: ' + e.message); }
    }

    function moAddPay(sid) {
      showMo('DODAJ WPŁATĘ', `
    <div class="ff2">
      <div class="ff"><label>Kwota (zł) *</label><input id="p-am" type="number" min="1" placeholder="np. 220"></div>
      <div class="ff"><label>Data</label><input id="p-dt" type="date" value="${todayISO()}"></div>
    </div>
    <div class="ff"><label>Uwaga</label><input id="p-nt" placeholder="opcjonalnie"></div>`,
        `<button class="btn btn-o" onclick="closeMo()">Anuluj</button>
     <button class="btn btn-g" onclick="doAddPay(${sid})">Zapisz wpłatę</button>`);
    }
    async function doAddPay(sid) {
      const amt = $('p-am').value;
      if (!amt) { alert('Podaj kwotę.'); return; }
      try {
        await api(`/api/instructor/students/${sid}/payments`, 'POST', {
          amount: parseFloat(amt), date: $('p-dt').value, note: $('p-nt').value.trim() || null
        });
        closeMo();
        openStud(sid);
      } catch (e) { alert('Błąd: ' + e.message); }
    }

    async function doDelPay(sid, pid) {
      if (!confirm('Usunąć tę wpłatę?')) return;
      try { await api(`/api/instructor/students/${sid}/payments?pid=${pid}`, 'DELETE'); openStud(sid); }
      catch (e) { alert('Błąd: ' + e.message); }
    }

    // ── INIT ──────────────────────────────────────────────────────
    // Reaguj na zmianę rozmiaru okna
    window.addEventListener('resize', () => {
      if (S.token) showMobileBars(true);
    });

    (function init() {
      const tok = localStorage.getItem('it'), ii = localStorage.getItem('ii'), ip = localStorage.getItem('ip');
      if (tok && ii) {
        try {
          setAuth(tok, JSON.parse(ii), ip ? JSON.parse(ip) : {});
          $('pg-login').style.display = 'none';
          $('app').classList.add('on');
          loadAll();
        } catch (e) { localStorage.removeItem('it'); localStorage.removeItem('ii'); localStorage.removeItem('ip'); }
      }
    })();
  </script>
</body>

</html>
