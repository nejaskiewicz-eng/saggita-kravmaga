<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Panel Admina — Krav Maga Saggita</title>
  <style>
    .link {
      color: var(--bright);
      text-decoration: underline;
      text-underline-offset: 3px
    }

    .link:hover {
      opacity: .85
    }

    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap');

    :root {
      --bg: #0f0b0b;
      --surface: #1c1414;
      --surface2: #241c1c;
      --surface3: #2c2222;
      --border: #3a2828;
      --border2: #4a3232;
      --red: #c42000;
      --red-l: #e83000;
      --red-bg: rgba(196, 32, 0, .12);
      --red-bdr: rgba(196, 32, 0, .35);
      --orange: #e8a500;
      --or-bg: rgba(232, 165, 0, .12);
      --or-bdr: rgba(232, 165, 0, .35);
      --green: #2ecc71;
      --gr-bg: rgba(46, 204, 113, .1);
      --gr-bdr: rgba(46, 204, 113, .3);
      --blue: #4a9fe8;
      --bl-bg: rgba(74, 159, 232, .1);
      --bl-bdr: rgba(74, 159, 232, .3);
      --text: #e8dada;
      --dim: #9a8080;
      --muted: #6a5555;
      --bright: #fff;
      --sw: 215px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      line-height: 1.5
    }

    #app {
      display: flex;
      height: 100vh;
      overflow: hidden
    }

    #sidebar {
      width: var(--sw);
      min-width: var(--sw);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column
    }

    #sidebar-logo {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border)
    }

    #sidebar-logo h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 19px;
      letter-spacing: .03em;
      color: var(--bright);
      line-height: 1.1;
      text-transform: uppercase
    }

    #sidebar-logo h1 em {
      color: var(--red-l);
      font-style: normal
    }

    #sidebar-logo small {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em
    }

    nav {
      flex: 1;
      padding: 8px;
      overflow-y: auto
    }

    nav a {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 5px;
      color: var(--dim);
      font-weight: 500;
      font-size: 13px;
      transition: all .15s;
      cursor: pointer;
      margin-bottom: 1px;
      text-decoration: none
    }

    nav a:hover {
      color: var(--bright);
      background: var(--surface2)
    }

    nav a.active {
      color: var(--bright);
      background: var(--red-bg);
      border-left: 2px solid var(--red-l);
      padding-left: 8px
    }

    .nd {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
      transition: background .15s
    }

    nav a:hover .nd {
      background: var(--dim)
    }

    nav a.active .nd {
      background: var(--red-l)
    }

    .sl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--red);
      padding: 14px 10px 4px;
      text-transform: uppercase;
      opacity: .7
    }

    #sf {
      padding: 12px;
      border-top: 1px solid var(--border)
    }

    .ui {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px
    }

    .ui strong {
      display: block;
      color: var(--text);
      font-size: 13px
    }

    #btn-logout {
      width: 100%;
      padding: 7px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--dim);
      cursor: pointer;
      font-size: 12px;
      font-family: 'Barlow', sans-serif;
      transition: all .15s
    }

    #btn-logout:hover {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-bg)
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    #topbar {
      height: 50px;
      min-height: 50px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px
    }

    #topbar h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--bright);
      text-transform: uppercase;
      letter-spacing: .05em;
      flex: 1
    }

    #api-status {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    #api-status.ok {
      background: var(--gr-bg);
      color: var(--green);
      border: 1px solid var(--gr-bdr)
    }

    #api-status.err {
      background: var(--red-bg);
      color: var(--red-l);
      border: 1px solid var(--red-bdr)
    }

    #content {
      flex: 1;
      overflow-y: auto;
      padding: 24px
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 28px
    }

    .sc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden
    }

    .sc::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--border2)
    }

    .sc.accent::before {
      background: var(--red-l)
    }

    .sc.green::before {
      background: var(--green)
    }

    .sc.orange::before {
      background: var(--orange)
    }

    .sc .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--dim);
      margin-bottom: 8px
    }

    .sc .value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
      color: var(--bright)
    }

    .sc.accent .value {
      color: var(--red-l)
    }

    .sc.green .value {
      color: var(--green)
    }

    .sc.orange .value {
      color: var(--orange)
    }

    .sh {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px
    }

    .sh h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--bright);
      text-transform: uppercase;
      letter-spacing: .05em;
      border-left: 3px solid var(--red);
      padding-left: 10px
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      border: none;
      font-family: 'Barlow', sans-serif;
      text-transform: uppercase;
      letter-spacing: .05em;
      line-height: 1
    }

    .btn-primary {
      background: var(--red);
      color: #fff
    }

    .btn-primary:hover {
      background: var(--red-l)
    }

    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text)
    }

    .btn-secondary:hover {
      border-color: var(--red);
      color: var(--bright)
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 11px
    }

    .bi {
      padding: 5px 10px;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--dim);
      cursor: pointer;
      transition: all .15s;
      font-size: 11px;
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      line-height: 1.4
    }

    .bi:hover {
      color: var(--bright);
      background: var(--surface2)
    }

    .bi.del:hover {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-bg)
    }

    .fb {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px
    }

    .fb input,
    .fb select {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--text);
      padding: 7px 10px;
      font-size: 13px;
      font-family: 'Barlow', sans-serif;
      outline: none;
      transition: border-color .15s
    }

    .fb input:focus,
    .fb select:focus {
      border-color: var(--red)
    }

    .fb input[type=text] {
      min-width: 220px
    }

    .fb select {
      min-width: 150px
    }

    .tw {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden
    }

    table {
      width: 100%;
      border-collapse: collapse
    }

    thead th {
      background: var(--surface2);
      padding: 11px 14px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--dim);
      white-space: nowrap;
      border-bottom: 2px solid var(--border2)
    }

    tbody tr {
      border-top: 1px solid var(--border);
      transition: background .1s
    }

    tbody tr:hover {
      background: var(--surface2)
    }

    tbody td {
      padding: 11px 14px;
      font-size: 13px;
      vertical-align: middle;
      color: var(--text)
    }

    .tda {
      display: flex;
      gap: 5px;
      flex-wrap: wrap
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      line-height: 1.4
    }

    .bg {
      background: var(--gr-bg);
      color: var(--green);
      border: 1px solid var(--gr-bdr)
    }

    .br {
      background: var(--red-bg);
      color: #ff6b4a;
      border: 1px solid var(--red-bdr)
    }

    .bo {
      background: var(--or-bg);
      color: var(--orange);
      border: 1px solid var(--or-bdr)
    }

    .bx {
      background: var(--surface3);
      color: var(--dim);
      border: 1px solid var(--border2)
    }

    .bb {
      background: var(--bl-bg);
      color: var(--blue);
      border: 1px solid var(--bl-bdr)
    }

    .cb {
      width: 80px;
      height: 5px;
      background: var(--surface3);
      border-radius: 3px;
      display: inline-block;
      vertical-align: middle;
      margin-right: 7px
    }

    .cf {
      height: 100%;
      background: var(--green);
      border-radius: 3px
    }

    .cf.w {
      background: var(--orange)
    }

    .cf.f {
      background: var(--red-l)
    }

    .ct {
      font-size: 12px;
      color: var(--dim)
    }

    .pag {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      justify-content: center
    }

    .pag button {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--dim);
      padding: 7px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      transition: all .15s
    }

    .pag button:hover:not(:disabled) {
      border-color: var(--red);
      color: var(--bright)
    }

    .pag button:disabled {
      opacity: .3;
      cursor: not-allowed
    }

    .pag .pi {
      font-size: 12px;
      color: var(--dim)
    }

    .mo {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .85);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(3px)
    }

    .md {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      width: 100%;
      max-width: 720px;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0, 0, 0, .7)
    }

    .mh {
      padding: 18px 22px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1
    }

    .mh h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--bright);
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .mb {
      padding: 22px
    }

    .mf {
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      background: var(--surface2);
      position: sticky;
      bottom: 0
    }

    .kart-header {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 18px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 16px
    }

    .kart-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--red-bg);
      border: 2px solid var(--red-bdr);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--red-l);
      flex-shrink: 0
    }

    .kart-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--bright);
      text-transform: uppercase
    }

    .kart-meta {
      font-size: 12px;
      color: var(--dim);
      margin-top: 3px
    }

    .kart-badges {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap
    }

    .ksec {
      border-top: 1px solid var(--border);
      margin-top: 18px;
      padding-top: 16px
    }

    .ksec-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--red);
      margin-bottom: 12px
    }

    .fg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .fg .full {
      grid-column: 1 / -1
    }

    .ff {
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .ff label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--dim)
    }

    .ff input,
    .ff select,
    .ff textarea {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--bright);
      padding: 9px 11px;
      font-size: 13px;
      font-family: 'Barlow', sans-serif;
      outline: none;
      transition: all .15s;
      width: 100%
    }

    .ff input:focus,
    .ff select:focus,
    .ff textarea:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 2px var(--red-bg)
    }

    .ff textarea {
      resize: vertical;
      min-height: 70px
    }

    select option {
      background: #1c1414
    }

    .ff .view-val {
      font-size: 14px;
      color: var(--bright);
      font-weight: 500;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      min-height: 28px
    }

    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9000
    }

    .lb {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, .8)
    }

    .lb .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--bright);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 4px
    }

    .lb .logo em {
      color: var(--red-l);
      font-style: normal
    }

    .lb p {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 28px
    }

    .lb label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--dim);
      margin-bottom: 6px
    }

    .lb input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--bright);
      padding: 11px 13px;
      font-size: 14px;
      font-family: 'Barlow', sans-serif;
      outline: none;
      transition: all .15s;
      margin-bottom: 14px
    }

    .lb input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 2px var(--red-bg)
    }

    #login-btn {
      width: 100%;
      padding: 12px;
      background: var(--red);
      border: none;
      border-radius: 5px;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 4px;
      transition: background .15s
    }

    #login-btn:hover {
      background: var(--red-l)
    }

    #login-error {
      color: #ff6b4a;
      font-size: 12px;
      margin-top: 10px;
      display: none
    }

    #toasts {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .toast {
      padding: 12px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
      max-width: 320px;
      animation: si .2s ease
    }

    .toast.success {
      background: var(--green);
      color: #000
    }

    .toast.error {
      background: var(--red-l);
      color: #fff
    }

    .toast.info {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text)
    }

    @keyframes si {
      from {
        transform: translateX(20px);
        opacity: 0
      }

      to {
        transform: translateX(0);
        opacity: 1
      }
    }

    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: var(--dim);
      gap: 12px;
      font-size: 13px
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border2);
      border-top-color: var(--red-l);
      border-radius: 50%;
      animation: sp .7s linear infinite
    }

    @keyframes sp {
      to {
        transform: rotate(360deg)
      }
    }

    .empty {
      padding: 60px;
      text-align: center;
      color: var(--dim)
    }

    .empty strong {
      display: block;
      font-size: 16px;
      color: var(--text);
      margin-bottom: 8px
    }

    .ib {
      background: var(--surface2);
      border-left: 3px solid var(--red);
      border-radius: 0 5px 5px 0;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--dim);
      margin-bottom: 16px;
      line-height: 1.6
    }

    .ib strong {
      color: var(--bright)
    }

    .bulk-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center
    }

    .chk {
      width: 18px;
      height: 18px;
      cursor: pointer
    }

    /* ═════════════════════════════════════════════════════════════
   MOBILE / RESPONSYWNOŚĆ (panel admina)
   ═════════════════════════════════════════════════════════════ */
    #btn-menu {
      display: none;
      min-width: 44px;
      min-height: 44px;
      justify-content: center;
      font-size: 18px
    }

    #sb-overlay {
      display: none
    }

    .tw {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch
    }

    /* Bottom navigation (mobile only) */
    #bot-nav-admin {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1400;
      background: var(--surface);
      border-top: 1px solid var(--border);
      height: 58px;
      align-items: center;
      justify-content: space-around;
    }

    .bna {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 6px 2px;
      cursor: pointer;
      color: var(--dim);
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;

<body>

    <div id="sb-overlay" onclick="toggleSidebar(false)"></div>

    <!-- MOBILE BOTTOM NAV -->
    <nav id="bot-nav-admin">
      <button class="bna active" data-view="dashboard" onclick="switchBotNav('dashboard')"> <span
          class="bna-ico">▣</span>Dashboard</button>
      <button class="bna" data-view="unified-students" onclick="switchBotNav('unified-students')"> <span
          class="bna-ico">◈</span>Kursanci</button>

          class="bna-ico">✉</span>Zapisy</button>

          class="bna-ico">⬡</span>Grupy</button>

    </nav>

    <main id="main">
      <div id="topbar">
        <button id="btn-menu" class="bi" type="button" aria-label="Menu" onclick="toggleSidebar()">☰</button>
        <h2 id="page-title">Dashboard</h2>
        <span id="api-status" class="ok">API OK</span>
      </div>
      <div id="content"></div>
    </main>

  <div id="toasts"></div>

  <script>
    const API = '/api/admin-api';
    let TOKEN = localStorage.getItem('km_token') || '';
    let CV = 'dashboard', ro = 0;
    const RL = 30;

    const DAYS = ['Niedziela', 'Poniedziałek', 'Wtorek', 'Środa', 'Czwartek', 'Piątek', 'Sobota'];

    const PS = {
      paid: 'Opłacony', unpaid: 'Nieopłacony', pending: 'Oczekujący',
      partial: 'Częściowy', waived: 'Zwolniony'
    };
    const RS = { new: 'Nowy', confirmed: 'Potwierdzony', cancelled: 'Anulowany', completed: 'Zakończony' };

    function isMobile() {
      return window.matchMedia && window.matchMedia('(max-width: 980px)').matches;
    }
    function toggleSidebar(force) {
      const open = document.body.classList.contains('sb-open');
      const next = (typeof force === 'boolean') ? force : !open;
      if (!isMobile()) {
        document.body.classList.remove('sb-open');
        return;
      }
      document.body.classList.toggle('sb-open', next);
    }
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') toggleSidebar(false);
    });
    window.addEventListener('resize', () => {
      if (!isMobile()) toggleSidebar(false);
    });

    function arrRows(x) {
      if (!x) return [];
      if (Array.isArray(x)) return x;
      if (Array.isArray(x.rows)) return x.rows;
      if (Array.isArray(x.data)) return x.data;
      return [];
    }
    function setAS(ok) {
      const e = document.getElementById('api-status');
      e.textContent = ok ? 'API OK' : 'API ERROR';
      e.className = ok ? 'ok' : 'err';
    }
    function toast(msg, type = 'success', ms = 3500) {
      const e = document.createElement('div');
      e.className = `toast ${type}`;
      e.textContent = msg;
      document.getElementById('toasts').appendChild(e);
      setTimeout(() => e.remove(), ms);
    }
    function closeModal() { document.getElementById('modal-overlay')?.remove(); }
    function showModal(title, body, footer) {
      closeModal();
      const ov = document.createElement('div'); ov.className = 'mo'; ov.id = 'modal-overlay';
      ov.innerHTML = `
    <div class="md">
      <div class="mh">
        <h3>${title}</h3>
        <button class="bi" onclick="closeModal()">✕ Zamknij</button>
      </div>
      <div class="mb">${body}</div>
      ${footer ? `<div class="mf">${footer}</div>` : ''}
    </div>`;
      ov.addEventListener('click', e => { if (e.target === ov) closeModal(); });
      document.body.appendChild(ov);
    }
    function fd(v) { if (!v) return '—'; try { return new Date(v).toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric' }); } catch { return v; } }
    function fdt(v) { if (!v) return '—'; try { return new Date(v).toLocaleString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }); } catch { return v; } }
    function pb(s) { const m = { paid: 'bg', unpaid: 'br', pending: 'bo', partial: 'bo', waived: 'bx' }; return `<span class="badge ${m[s] || 'bx'}">${PS[s] || s || '—'}</span>`; }
    function sb(s) { const m = { confirmed: 'bg', new: 'bo', cancelled: 'br', completed: 'bx' }; return `<span class="badge ${m[s] || 'bx'}">${RS[s] || s || '—'}</span>`; }
    function capB(r, m) { const p = m ? Math.min(100, Math.round(r / m * 100)) : 0; const c = p >= 100 ? 'f' : p >= 80 ? 'w' : ''; return `<span class="cb"><span class="cf ${c}" style="width:${p}%"></span></span><span class="ct">${r}/${m || '?'}</span>`; }
    function initials(fn, ln) { return ((fn || '?')[0] + (ln || '?')[0]).toUpperCase(); }

    async function aF(path, opts = {}) {
      const h = { 'Content-Type': 'application/json' };
      if (TOKEN) h['Authorization'] = `Bearer ${TOKEN}`;

      const url = API + (path.startsWith('/') ? path : '/' + path);

      try {
        const r = await fetch(url, { headers: h, ...opts });
        const d = await r.json().catch(() => ({ error: 'Błąd odpowiedzi serwera' }));
        if (!r.ok) throw new Error(d.error || `Błąd HTTP ${r.status}`);
        setAS(true);
        return d;
      } catch (e) {
        setAS(false);
        throw e;
      }
    }

    async function deleteReg(id) {
      if (!confirm('Na pewno usunąć ten zapis? Operacja jest nieodwracalna!')) return;
      try {
        await aF(`/registrations/${id}`, { method: 'DELETE' });
        toast('Zapis usunięty', 'success');
        if (CV === 'dashboard') loadDash();
        if (CV === 'web-registrations') fetchR('web');
        if (CV === 'participants') fetchR('admin');
      } catch (e) {
        toast('Błąd: ' + e.message, 'error');
      }
    }

    async function bulkDeleteReg() {
      const checked = Array.from(document.querySelectorAll('.reg-check:checked')).map(c => parseInt(c.value));
      if (!checked.length) { toast('Zaznacz co najmniej jeden zapis', 'error'); return; }
      if (!confirm(`Usunąć ${checked.length} zaznaczonych zapisów? Nie można cofnąć!`)) return;

      let ok = 0, fail = 0;
      for (const id of checked) {
        try {
          await aF(`/registrations/${id}`, { method: 'DELETE' });
          ok++;
        } catch {
          fail++;
        }
      }

      toast(`Usunięto: ${ok}, błędów: ${fail}`, fail ? 'error' : 'success');

      if (CV === 'dashboard') loadDash();
      if (CV === 'web-registrations') fetchR('web');
      if (CV === 'participants') fetchR('admin');
    }

    function toggleAllChecks(source) {
      const all = document.getElementById('check-all-' + source);
      const boxes = document.querySelectorAll('.reg-check-' + source);
      boxes.forEach(b => b.checked = all.checked);
    }

    function showLogin() {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
    function showApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      try {
        const u = JSON.parse(atob(TOKEN.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        document.getElementById('admin-username').textContent = u.username || '—';
      } catch { }
      navigate('dashboard');
    }
    async function checkLogin() {
      if (!TOKEN) return showLogin();
      try {
        await aF('/stats'); showApp();
        // auto-przejście z linków z dashboardu (klik w lokalizacje)
        try {
          if (location.hash === '#students') {
            navigate('unified-students');
          }
        } catch (e) { }
      } catch { showLogin(); }
    }

    document.getElementById('login-btn').addEventListener('click', async () => {
      const u = document.getElementById('l-user').value.trim();
      const p = document.getElementById('l-pass').value;
      const e = document.getElementById('login-error'); e.style.display = 'none';
      if (!u || !p) { e.textContent = 'Podaj login i hasło.'; e.style.display = 'block'; return; }
      try {
        const d = await aF('/login', { method: 'POST', body: JSON.stringify({ username: u, password: p }) });
        TOKEN = d.token;
        localStorage.setItem('km_token', TOKEN);
        showApp();
      } catch (err) {
        e.textContent = err.message;
        e.style.display = 'block';
      }
    });
    document.getElementById('l-pass').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-btn').click(); });
    document.getElementById('btn-logout').addEventListener('click', () => {
      TOKEN = '';
      localStorage.removeItem('km_token');
      showLogin();
    });

    function navigate(view) {
      CV = view;
      toggleSidebar(false);
      document.querySelectorAll('nav a[data-view]').forEach(a => a.classList.toggle('active', a.dataset.view === view));

      const titles = {
        dashboard: 'Dashboard',
        'web-registrations': 'Zapisy ze strony',
        participants: 'Baza kursantów',
        'add-participant': 'Dodaj kursanta',
        groups: 'Grupy',
        schedules: 'Grafik zajęć',
        locations: 'Lokalizacje',
        plans: 'Cennik',
        'unified-students': 'Baza kursantów',
        'legacy-history': 'Archiwum CSV',
        'instructors': 'Instruktorzy',
        'admin-sessions': 'Sesje treningowe',
        'reports': 'Raporty'
      };
      document.getElementById('page-title').textContent = titles[view] || view;
      document.getElementById('content').innerHTML = '<div class="loader"><div class="spinner"></div> Ładowanie…</div>';

      const fns = {
        dashboard: loadDash,
        'web-registrations': () => loadReg('web'),
        participants: () => loadReg('admin'),
        'add-participant': loadAdd,
        groups: loadGroups,
        schedules: loadSchedules,
        locations: loadLocations,
        plans: loadPlans,
        'unified-students': loadUnifiedStudents,
        'legacy-history': loadHistory,
        'instructors': loadInstructors,
        'admin-sessions': loadAdminSessions,
        'reports': loadReports
      };
      (fns[view] || (() => document.getElementById('content').innerHTML = ''))();
    }
    document.querySelectorAll('nav a[data-view]').forEach(a => a.addEventListener('click', () => navigate(a.dataset.view)));

    document.getElementById('btn-export').addEventListener('click', async () => {
      try {
        const url = API + '/export';
        const r = await fetch(url, { headers: TOKEN ? { 'Authorization': `Bearer ${TOKEN}` } : {} });
        if (!r.ok) {
          const t = await r.text().catch(() => '');
          throw new Error(t || `Błąd pobierania CSV (${r.status})`);
        }
        const blob = await r.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `saggita-export-${new Date().toISOString().slice(0, 10)}.csv`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        toast('CSV pobrane', 'success');
      } catch (e) {
        toast('Błąd CSV: ' + e.message, 'error');
      }
    });


    function openStudentsByCity(city, season) {
      try {
        // Ustawiamy filtry w URL (admin.html trzyma stan w querystring)
        const u = new URL(location.href);
        u.hash = '#students';
        if (city) u.searchParams.set('city', city);
        else u.searchParams.delete('city');
        if (season) u.searchParams.set('season', season);
        else u.searchParams.delete('season');
        u.searchParams.set('page', '1');
        history.pushState({}, '', u.toString());
        // przejście do widoku kursantów + reload
        navigate('unified-students');
      } catch (e) {
        console.error(e);
        toast('Nie udało się otworzyć listy kursantów', 'error');
      }
    }

    async function loadDash() {
      const c = document.getElementById('content');
      try {
        const [d, eventsData] = await Promise.all([
          aF('/stats'),
          aF('/instructor-events').catch(() => ({ rows: [], unseen: 0 }))
        ]);
        const events = eventsData.rows || [];

    async function fetchR(source) {
      const bodyEl = document.getElementById('r-body');
      const pi = document.getElementById('r-pi');
      const prev = document.getElementById('r-prev');
      const next = document.getElementById('r-next');

      bodyEl.innerHTML = `<tr><td colspan="8"><div class="loader"><div class="spinner"></div> Ładowanie…</div></td></tr>`;

      try {
        const q = document.getElementById('r-q')?.value.trim() || '';
        const st = document.getElementById('r-st')?.value || '';
        const ps = document.getElementById('r-ps')?.value || '';

        const qs = new URLSearchParams();
        qs.set('limit', String(RL));
        qs.set('offset', String(ro));
        qs.set('source', source);
        if (q) qs.set('q', q);
        if (st) qs.set('status', st);
        if (ps) qs.set('payment_status', ps);

        const d = await aF(`/registrations?${qs.toString()}&_=${Date.now()}`);
        const rows = arrRows(d);
        window.currentRows = rows;
        const total = d.total ?? d.count ?? (Array.isArray(d) ? d.length : rows.length);

        if (!rows.length) {
          bodyEl.innerHTML = `<tr><td colspan="8"><div class="empty"><strong>Brak wyników</strong>Zmienić filtry lub wyszukiwanie.</div></td></tr>`;
          pi.textContent = `0 / ${total || 0}`;
          prev.disabled = ro <= 0;
          next.disabled = true;
          return;
        }

        bodyEl.innerHTML = rows.map(r => `
      <tr>
        <td><input type="checkbox" class="chk reg-check reg-check-reg" value="${r.id}"></td>
        <td>
          <strong style="color:var(--bright)">${(r.first_name || '') + ' ' + (r.last_name || '')}</strong>
          <div style="color:var(--dim);font-size:12px">${r.email || '—'} · ${r.phone || '—'}</div>
        </td>
        <td>${r.city || r.location_city || '—'}</td>
        <td>${r.group_name || '—'}</td>
        <td>${sb(r.status)}</td>
        <td>${pb(r.payment_status)}</td>
        <td><span class="badge ${r.source === 'admin' ? 'bb' : 'bx'}">${r.source === 'admin' ? 'Admin' : 'WWW'}</span></td>
        <td style="color:var(--dim);font-size:12px">${fdt(r.created_at)}</td>
        <td class="tda" style="white-space:nowrap;">
          ${r.status === 'new' ? `<button class="bi" style="background:#0a6800;color:#fff;border-color:#074d00" onclick="acceptReg(${r.id})">Akceptuj</button>` : ''}
          <button class="bi" onclick="changeGroupPrompt(${r.id}, ${r.group_id})">Zmień Grupę</button>
          <button class="bi" ${r.doc_data ? `onclick="downloadAdminDocs(${r.id})"` : `disabled title="Brak dokumentów"`} style="${r.doc_data ? 'background:#0055ff;color:#fff' : ''}">Pobierz Dokumenty</button>
          <button class="bi" onclick="openKartoteka(${r.id},'view')">Kartoteka</button>
          <button class="bi" onclick="openKartoteka(${r.id},'edit')">Edytuj</button>
          <button class="bi del" onclick="deleteReg(${r.id})">Usuń</button>
        </td>
      </tr>
    `).join('');

        const shownFrom = Math.min(total || (ro + rows.length), ro + 1);
        const shownTo = ro + rows.length;
        pi.textContent = `${shownFrom}-${shownTo} / ${total || shownTo}`;

        prev.disabled = ro <= 0;
        next.disabled = total ? (shownTo >= total) : (rows.length < RL);

      } catch (e) {
        bodyEl.innerHTML = `<tr><td colspan="8"><div class="empty"><strong>Błąd</strong>${e.message}</div></td></tr>`;
        pi.textContent = `—`;
        prev.disabled = true;
        next.disabled = true;
      }
    }

      let r;
      let locations = [], groups = [], schedules = [], plans = [];
      try {
        const out = await Promise.all([
          aF(`/registrations/${id}?_=${Date.now()}`),
          aF('/locations'),
          aF('/groups'),
          aF('/schedules'),
          aF('/plans'),
        ]);
        r = out[0];
        locations = arrRows(out[1]);
        groups = arrRows(out[2]);
        schedules = arrRows(out[3]);
        plans = arrRows(out[4]);
      } catch (e) {
        toast('Błąd pobierania danych: ' + e.message, 'error');
        return;
      }

      const locOpts = locations.map(l =>
        `<option value="${l.id}" ${l.id == r.location_id ? 'selected' : ''}>${l.city} — ${l.name}</option>`
      ).join('');

      function schedLabel(s) {
        const day = DAYS[s.day_of_week] || s.day_name || s.day_of_week;
        const ts = s.time_start ? String(s.time_start).slice(0, 5) : '';
        const te = s.time_end ? String(s.time_end).slice(0, 5) : '';
        return `${day} ${ts}${te ? `–${te}` : ''}${s.address ? ` · ${s.address}` : ''}`;
      }

      const pO = `<option value="">— brak karnetu —</option>` + plans.map(p =>
        `<option value="${p.id}" ${p.id == r.price_plan_id ? 'selected' : ''}>${p.name} — ${p.price} zł${p.months ? ` / ${p.months} mies.` : ''}</option>`
      ).join('');

      const isEdit = mode === 'edit';
      const fld = (id, val, type = 'text') => isEdit
        ? `<input id="${id}" type="${type}" value="${val || ''}">`
        : `<div class="view-val">${val || '—'}</div>`;
      const txt = (id, val) => isEdit
        ? `<textarea id="${id}">${val || ''}</textarea>`
        : `<div class="view-val" style="white-space:pre-wrap">${val || '—'}</div>`;

      const payOpts = ['paid', 'unpaid', 'pending', 'partial', 'waived']
        .map(v => `<option value="${v}" ${r.payment_status === v ? 'selected' : ''}>${PS[v] || v}</option>`).join('');
      const statOpts = ['new', 'confirmed', 'cancelled', 'completed']
        .map(v => `<option value="${v}" ${r.status === v ? 'selected' : ''}>${RS[v] || v}</option>`).join('');
      const pmOpts = ['cash', 'transfer', 'card']
        .map(v => `<option value="${v}" ${r.payment_method === v ? 'selected' : ''}>${({ cash: 'Gotówka', transfer: 'Przelew', card: 'Karta' })[v] || v}</option>`).join('');

      const body = `
    <div class="kart-header">
      <div class="kart-avatar">${initials(r.first_name, r.last_name)}</div>
      <div>
        <div class="kart-name">${r.first_name || ''} ${r.last_name || ''}</div>
        <div class="kart-meta">${r.email || 'brak email'} · ${r.phone || 'brak tel.'} · ${r.city || 'brak miasta'}</div>
        <div class="kart-badges">
          ${sb(r.status)} ${pb(r.payment_status)}
          ${r.is_waitlist ? '<span class="badge bo">Lista rezerwowa</span>' : ''}
          <span class="badge ${r.source === 'admin' ? 'bb' : 'bx'}">${r.source === 'admin' ? 'Admin' : 'WWW'}</span>
        </div>
      </div>
    </div>

    <div class="ksec">
      <div class="ksec-title">Dane osobowe</div>
      <div class="fg">
        <div class="ff"><label>Imię</label>${fld('k-fn', r.first_name)}</div>
        <div class="ff"><label>Nazwisko</label>${fld('k-ln', r.last_name)}</div>
        <div class="ff"><label>Email</label>${fld('k-em', r.email, 'email')}</div>
        <div class="ff"><label>Telefon</label>${fld('k-ph', r.phone)}</div>
        <div class="ff"><label>Rok urodzenia</label>${fld('k-by', r.birth_year, 'number')}</div>
        <div class="ff"><label>Typ kursanta</label>${isEdit
          ? `<select id="k-in"><option value="true" ${r.is_new ? 'selected' : ''}>Nowy</option><option value="false" ${!r.is_new ? 'selected' : ''}>Kontynuacja</option></select>`
          : `<div class="view-val">${r.is_new ? 'Nowy kursant' : 'Kontynuacja'}</div>`

    </div>

    <div class="ksec">

        <div class="ff full">
          <label>Lokalizacja</label>
          ${isEdit ? `<select id="k-loc">${locOpts}</select>` : `<div class="view-val">${r.city ? `${r.city} — ${r.location_name || ''}` : '—'}</div>`}
        </div>

        <div class="ff full">
          <label>Grupa</label>
          ${isEdit ? `<select id="k-gr"></select>` : `<div class="view-val">${r.group_name || '—'}</div>`}

        <div class="ff"><label>Metoda</label>${isEdit ? `<select id="k-pm">${pmOpts}</select>` : `<div class="view-val">${({ cash: 'Gotówka', transfer: 'Przelew', card: 'Karta' })[r.payment_method] || r.payment_method || '—'}</div>`}</div>
        <div class="ff"><label>Kwota (zł)</label>${fld('k-am', r.total_amount, 'number')}</div>
        <div class="ff"><label>Kod ref.</label><div class="view-val" style="font-family:monospace;font-size:12px">${r.payment_ref || '—'}</div></div>
        <div class="ff"><label>Data opłaty</label><div class="view-val">${fdt(r.paid_at)}</div></div>
        <div class="ff"><label>Status zapisu</label>${isEdit ? `<select id="k-st">${statOpts}</select>` : `<div class="view-val">${sb(r.status)}</div>`}</div>
      </div>

    <div class="ksec">
      <div class="ksec-title">Historia i notatki</div>
      <div class="fg">
        <div class="ff"><label>Data zapisu</label><div class="view-val">${fdt(r.created_at)}</div></div>
        <div class="ff"><label>Preferowany czas</label><div class="view-val">${r.preferred_time || '—'}</div></div>

      </div>
    </div>

      const footer = isEdit
        ? `<button class="btn btn-secondary" onclick="openKartoteka(${id},'view')">Anuluj</button>
       <button class="btn btn-primary" onclick="saveKartoteka(${id})">Zapisz zmiany</button>`
        : `<button class="btn btn-secondary" onclick="closeModal()">Zamknij</button>
       <button class="btn btn-primary" onclick="openKartoteka(${id},'edit')">Edytuj kartotekę</button>
       <button class="btn btn-secondary" style="background:var(--red);border-color:var(--red)" onclick="deleteReg(${id})">Usuń zapis</button>`;

      showModal(`Kartoteka #${id}`, body, footer);

      if (mode === 'edit') {
        const elLoc = document.getElementById('k-loc');
        const elGr = document.getElementById('k-gr');
        const elSc = document.getElementById('k-sc');

        function rebuildGroups() {
          const locId = parseInt(elLoc.value || '0', 10);
          const gList = groups.filter(g => parseInt(g.location_id || 0, 10) === locId);
          elGr.innerHTML = gList.map(g => `<option value="${g.id}">${g.city || ''}${g.city ? ' — ' : ''}${g.name}</option>`).join('');
          const wanted = parseInt(r.group_id || 0, 10);
          if (gList.some(g => g.id == wanted)) elGr.value = String(wanted);
          rebuildSchedules();
        }

        function rebuildSchedules() {
          const gid = parseInt(elGr.value || '0', 10);
          const sList = schedules.filter(s => parseInt(s.group_id || 0, 10) === gid);
          elSc.innerHTML = `<option value="">— wybierz termin —</option>` + sList.map(s =>
            `<option value="${s.id}">${schedLabel(s)}</option>`
          ).join('');
          if (r.schedule_id && sList.some(s => s.id == r.schedule_id)) elSc.value = String(r.schedule_id);
        }

        elLoc.addEventListener('change', rebuildGroups);
        elGr.addEventListener('change', rebuildSchedules);
        rebuildGroups();
      }
    }

    async function saveKartoteka(id) {
      const b = {
        first_name: document.getElementById('k-fn')?.value || undefined,
        last_name: document.getElementById('k-ln')?.value || undefined,
        email: document.getElementById('k-em')?.value || null,
        phone: document.getElementById('k-ph')?.value || null,
        birth_year: parseInt(document.getElementById('k-by')?.value || '0', 10) || null,
        is_new: document.getElementById('k-in')?.value === 'true',
        group_id: parseInt(document.getElementById('k-gr')?.value || '0', 10) || null,
        schedule_id: parseInt(document.getElementById('k-sc')?.value || '0', 10) || null,
        price_plan_id: parseInt(document.getElementById('k-pl')?.value || '0', 10) || null,
        start_date: document.getElementById('k-sd')?.value || null,
        is_waitlist: document.getElementById('k-wl')?.value === 'true',
        payment_status: document.getElementById('k-ps')?.value,
        payment_method: document.getElementById('k-pm')?.value,
        total_amount: parseFloat(document.getElementById('k-am')?.value || '0') || 0,
        status: document.getElementById('k-st')?.value,
        admin_notes: document.getElementById('k-nt')?.value || null,
      };
      Object.keys(b).forEach(k => { if (b[k] === undefined) delete b[k]; });

      try {
        await aF(`/registrations/${id}?_=${Date.now()}`, { method: 'PATCH', body: JSON.stringify(b) });
        toast('Kartoteka zapisana');
        openKartoteka(id, 'view');
        if (CV === 'web-registrations') fetchR('web');
        if (CV === 'participants') fetchR('admin');
        if (CV === 'dashboard') loadDash();
      } catch (e) {
        toast('Błąd: ' + e.message, 'error');
      }
    }

    async function savePlan(id) {
      const name = document.getElementById('p-name').value.trim();
      const category = document.getElementById('p-cat').value;
      const price = parseFloat(document.getElementById('p-price').value || '');
      const months = parseInt(document.getElementById('p-months').value || '0', 10) || 0;
      const feeRaw = document.getElementById('p-fee').value;
      const signup_fee = feeRaw === '' ? null : (parseFloat(feeRaw) || 0);
      const description = document.getElementById('p-desc').value || null;
      const active = document.getElementById('p-active').value === 'true';

      if (!name) { toast('Uzupełnij: nazwa usługi', 'error'); return; }

      // Minimalny, bezpieczny payload (żeby nie wysypać się na kolumnach, których nie ma)
      const payload = { name, category, price, active, description };
      // months: 0 = jednorazowe, >0 = karnet (miesiące)
      payload.months = months;
      // wpisowe: opcjonalne
      if (signup_fee !== null) payload.signup_fee = signup_fee;

      try {
        if (id) {
          await aF(`/plans?id=${id}`, { method: 'PATCH', body: JSON.stringify(payload) });
          toast('Pozycja zaktualizowana', 'success');

    let US = { page: 1, total: 0, limit: 60, overdue: false };
    let usTimer;

    function toggleOverdue() {
      US.overdue = !US.overdue;
      US.page = 1;
      const btn = document.getElementById('us-overdue-btn');
      const bar = document.getElementById('us-overdue-bar');
      if (btn) btn.style.background = US.overdue ? 'rgba(220,50,30,0.35)' : 'rgba(220,50,30,0.15)';
      if (bar) bar.style.display = US.overdue ? 'block' : 'none';

    }

    async function loadUnifiedStudents() {
      const c = document.getElementById('content');
      let groupOpts = '<option value="">Wszystkie grupy</option>';
      let cityOpts = '<option value="">Wszystkie miasta</option>';
      try {
        const gd = arrRows(await aF('/groups'));
        const activeGd = gd.filter(g => g.active !== false);
        activeGd.forEach(g => { groupOpts += `<option value="${g.id}">${g.name}${g.city ? ' (' + g.city + ')' : ''}</option>`; });
        const cities = [...new Set(activeGd.map(g => g.city).filter(Boolean))];
        cities.forEach(c => { cityOpts += `<option value="${c}">${c}</option>`; });
      } catch (e) { }

      c.innerHTML = `
    <div class="sh">
      <h3>Baza kursantów</h3>
      <button class="btn btn-primary btn-sm" onclick="openNewStudentModal()">+ Dodaj kursanta</button>
    </div>
    <div class="fb">
      <input id="us-q" type="text" placeholder="Szukaj: imię, nazwisko, email, telefon…" oninput="usDebounce()">
      <select id="us-grp" onchange="US.page=1;fetchUS()">${groupOpts}</select>
      <select id="us-city" onchange="US.page=1;fetchUS()">${cityOpts}</select>
      <select id="us-pay" onchange="US.page=1;fetchUS()">
        <option value="">Każdy status płatności</option>
        <option value="paid">Opłacony</option>
        <option value="unpaid">Nieopłacony</option>
        <option value="pending">Oczekuje</option>
      </select>
      <select id="us-season" onchange="US.page=1;fetchUS()">
        <option value="true" selected>Sezon 2025/2026</option>
        <option value="">Wszyscy kursanci</option>
      </select>
      <select id="us-active" onchange="US.page=1;fetchUS()">
        <option value="true" selected>Tylko aktywni</option>
        <option value="">Aktywni i nieaktywni</option>
        <option value="false">Tylko nieaktywni</option>
      </select>
      <select id="us-sort" onchange="US.page=1;fetchUS()">
        <option value="recent">Ostatni trening ↓</option>
        <option value="alpha">Nazwisko A–Z</option>
        <option value="payment">Ostatnia wpłata ↓</option>
        <option value="active">Status aktywności ↓</option>
      </select>
      <button class="btn btn-secondary btn-sm" onclick="US.page=1;usClear()">✕ Wyczyść</button>
      <button id="us-overdue-btn" class="btn btn-sm" style="background:rgba(220,50,30,0.15);border:1px solid rgba(220,50,30,0.4);color:#ff6b5b" onclick="toggleOverdue()">⚠️ Zaległości</button>
      <span id="us-count" style="color:var(--dim);font-size:12px"></span>
    </div>
    <div id="us-overdue-bar" style="display:none;background:rgba(220,50,30,0.1);border:1px solid rgba(220,50,30,0.3);border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--red-l)">
      ⚠️ <strong>Tryb: Zaległości</strong> — aktywni kursanci, którzy byli na treningu w ostatnich 60 dniach, ale nie zapłacili od ponad 35 dni (lub wcale).
    </div>
    <div class="tw"><table>
      <thead><tr>
        <th>Kursant</th><th>Kontakt</th><th>Grupy</th><th>Źródło</th>
        <th>Treningi</th><th>Ostatni trening</th><th>Ostatnia wpłata</th><th>Status płatności</th><th></th>
      </tr></thead>
      <tbody id="us-body">
        <tr><td colspan="9"><div class="loader"><div class="spinner"></div> Ładowanie...</div></td></tr>
      </tbody>
    </table></div>
    <div class="pag" id="us-pag"></div>`;

      US.page = 1;
      await fetchUS();
    }

    function usDebounce() { clearTimeout(usTimer); usTimer = setTimeout(() => { US.page = 1; fetchUS(); }, 380); }

    function usClear() {
      ['us-q', 'us-grp', 'us-city', 'us-pay'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      const activeEl = document.getElementById('us-active'); if (activeEl) activeEl.value = 'true';
      const seasonEl = document.getElementById('us-season'); if (seasonEl) seasonEl.value = 'true';
      fetchUS();
    }

    async function fetchUS() {
      const tbody = document.getElementById('us-body');
      if (!tbody) return;
      tbody.innerHTML = '<tr><td colspan="9"><div class="loader"><div class="spinner"></div></div></td></tr>';

      const p = new URLSearchParams({ page: US.page, limit: US.limit });
      const q = document.getElementById('us-q')?.value; if (q) p.set('search', q);
      const grp = document.getElementById('us-grp')?.value; if (grp) p.set('group_id', grp);
      const city = document.getElementById('us-city')?.value; if (city) p.set('city', city);
      const pay = document.getElementById('us-pay')?.value; if (pay) p.set('payment_status', pay);
      const act = document.getElementById('us-active')?.value; if (act) p.set('is_active', act);
      const sort = document.getElementById('us-sort')?.value; if (sort) p.set('sort', sort);
      const season = document.getElementById('us-season')?.value; if (season) p.set('season_only', season);
      if (US.overdue) p.set('overdue', 'true');

      try {
        const d = await aF('/students?' + p.toString());
        const rows = arrRows(d);
        US.total = d.total || rows.length;
        const countEl = document.getElementById('us-count');
        if (countEl) countEl.textContent = US.total + ' wyników' + (US.overdue ? ' z zaległościami' : '');

        if (!rows.length) {
          tbody.innerHTML = '<tr><td colspan="9"><div class="empty"><strong>' + (US.overdue ? '✅ Brak zaległości!' : 'Brak wyników') + '</strong>' + (US.overdue ? 'Wszyscy aktywni kursanci mają aktualne płatności.' : 'Zmień filtry lub dodaj kursanta.') + '</div></td></tr>';
          document.getElementById('us-pag').innerHTML = '';
          return;
        }

        tbody.innerHTML = rows.map(r => {
          const srcBadge = r.source === 'legacy' ? '<span class="badge bx">legacy</span>'
            : r.source === 'manual' ? '<span class="badge bb">ręczny</span>'
              : '<span class="badge bg">www</span>';
          const groups = Array.isArray(r.groups) && r.groups.length
            ? r.groups.slice(0, 2).map(g => `<span class="badge bx" style="font-size:10px">${g.name}</span>`).join('')
            + (r.groups.length > 2 ? `<span style="font-size:10px;color:var(--dim)"> +${r.groups.length - 2}</span>` : '')
            : '—';
          const payBadge = r.payment_status ? pb(r.payment_status)
            : (r.legacy_paid > 0 ? `<span class="badge bg">${Number(r.legacy_paid).toFixed(0)} zł</span>` : '<span class="badge br">brak</span>');

          // Ostatnia wpłata z kolorowaniem
          let lastPayHtml = '—';
          if (r.last_payment_date) {
            const days = r.days_since_payment;
            const color = days > 60 ? 'var(--red-l)' : days > 35 ? '#f0a500' : 'var(--green)';
            const icon = days > 60 ? '🔴' : days > 35 ? '🟡' : '🟢';
            lastPayHtml = `<span style="font-family:monospace;font-size:11px;color:${color}">${icon} ${fd(r.last_payment_date)}</span><br><span style="font-size:10px;color:var(--dim)">${days} dni temu</span>`;
          } else if (r.legacy_paid == 0 && !r.payment_status) {
            lastPayHtml = '<span style="color:var(--red-l);font-size:11px">🔴 nigdy</span>';
          }

          const inactive = !r.is_active ? ' <span class="badge br">Nieaktywny</span>' : '';
          // Wyróżnienie wiersza zaległości
          const rowStyle = US.overdue ? 'background:rgba(220,50,30,0.05)' : '';

          const isPaid = r.payment_status === 'paid' || (r.last_payment_date && r.days_since_payment <= 35);
          const nameColor = isPaid ? 'var(--bright)' : 'var(--red-l)';

          return `<tr style="${rowStyle}">
        <td>
          <strong style="color:${nameColor}">${r.first_name} ${r.last_name}</strong>${inactive}
          <br><span style="color:var(--dim);font-size:11px">${r.email || 'brak email'}</span>
        </td>
        <td style="color:var(--dim);font-size:12px">${r.phone || '—'}</td>
        <td>${groups}</td>
        <td>${srcBadge}</td>
        <td>${r.total_present || 0}<br><span style="font-size:10px;color:var(--dim)">${r.present_60d || 0} / 60 dni</span></td>
        <td style="font-size:12px;color:var(--dim)">${r.last_training ? fd(r.last_training) : '—'}</td>
        <td>${lastPayHtml}</td>
        <td>${payBadge}</td>
        <td>
          <div class="tda">
            <button class="bi" onclick="openStudentKartoteka(${r.id})">Kartoteka</button>
            <button class="bi del" onclick="confirmDeleteStudent(${r.id},'${(r.first_name + ' ' + r.last_name).replace(/'/g, "\\'")}')">Usuń</button>
          </div>
        </td>
      </tr>`;
        }).join('');

        // Paginacja

        <button ${US.page >= pages ? 'disabled' : ''} onclick="US.page++;fetchUS()">Dalej</button>`;
        } else {
          pagEl.innerHTML = '';

        </div>
      </div>
    </div>

    ${s.registration ? `
    <div class="ksec">
      <div class="ksec-title">Zapis z systemu (WWW)</div>

        <div class="ff"><label>Grupa</label><div class="view-val">${s.registration.group_name || '—'}</div></div>
        <div class="ff"><label>Karnet</label><div class="view-val">${s.registration.plan_name || '—'}</div></div>

            <option value="unpaid"  ${s.registration.payment_status === 'unpaid' ? 'selected' : ''}>Nieopłacony</option>
            <option value="pending" ${s.registration.payment_status === 'pending' ? 'selected' : ''}>Oczekuje</option>
            <option value="waived"  ${s.registration.payment_status === 'waived' ? 'selected' : ''}>Zwolniony</option>
          </select>
        </div>
      </div>

    <div class="ksec">
      <div class="ksec-title" style="display:flex;align-items:center;justify-content:space-between">

        <table width="100%" style="border-collapse:collapse;font-size:12px">
          <thead><tr>
            <th style="text-align:left;padding:6px 8px;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)">Data</th>
            <th style="text-align:left;padding:6px 8px;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)">Kwota</th>
            <th style="text-align:left;padding:6px 8px;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)">Notatka</th>
            <th style="border-bottom:1px solid var(--border)"></th>
          </tr></thead>
          <tbody>${legacy.map(p => `
            <tr style="border-top:1px solid var(--border)">

              <td style="padding:7px 8px;color:var(--dim)">
                ${p.note || '—'}
                ${p.accepted_by ? `<span style="display:inline-block;margin-left:8px;padding:2px 7px;background:rgba(74,159,232,.12);border:1px solid rgba(74,159,232,.3);border-radius:3px;font-size:10px;color:var(--blue);font-weight:700">👤 ${p.accepted_by}</span>` : ''}
              </td>
              <td style="padding:7px 8px">
                <div class="tda">
                  <button class="bi btn-sm" onclick="openEditPayModal(${id},${p.id},${p.amount},'${p.date ? String(p.date).slice(0, 10) : ''}','${(p.note || '').replace(/'/g, "\\'")}')">✏</button>
                  <button class="bi del btn-sm" onclick="deleteStudentPayment(${id},${p.id})">✕</button>
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>` : '<p style="color:var(--dim);font-size:12px;padding:8px 0">Brak płatności ręcznych.</p>'}
      ${regs.length ? `
        <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:8px">Z systemu rejestracji:</div>
          ${regs.map(p => `
            <div style="display:flex;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:center">
              <span style="color:var(--dim)">${p.date ? fd(p.date) : '—'}</span>
              <strong style="color:var(--bright)">${p.amount} zł</strong>
              <span style="color:var(--dim)">${p.plan_name || '—'}</span>
              ${pb(p.status)}
            </div>`).join('')}
        </div>` : ''}
    </div>

    <div class="ksec">
      <div class="ksec-title">Obecności (ostatnie 100)</div>
      ${attRows.length ? `
        <div style="display:flex;gap:20px;padding:10px;background:var(--surface2);border-radius:6px;margin-bottom:12px">
          <span><strong style="color:var(--green)">${present}</strong> <span style="color:var(--dim);font-size:11px">obecny</span></span>
          <span><strong style="color:var(--red-l)">${attRows.length - present}</strong> <span style="color:var(--dim);font-size:11px">nieobecny</span></span>
          <span><strong>${pct}%</strong> <span style="color:var(--dim);font-size:11px">frekwencja</span></span>
        </div>
        <div style="max-height:220px;overflow-y:auto">
          ${attRows.map(a => `
            <div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
              <span style="width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block;background:${a.present ? 'var(--green)' : 'var(--border2)'}"></span>
              <span style="font-family:monospace;color:var(--dim);min-width:85px">${fd(a.session_date)}</span>
              <span style="flex:1;color:var(--dim)">${a.group_name || '—'}</span>
              <span style="color:${a.present ? 'var(--green)' : 'var(--muted)'}">${a.present ? 'Obecny' : 'Nieobecny'}</span>
              <button class="bi btn-sm" title="Zmień" onclick="toggleStudentAtt(${id},${a.id},${!a.present})">${a.present ? '✗' : '✓'}</button>
            </div>`).join('')}
        </div>` : '<p style="color:var(--dim);font-size:12px;padding:8px 0">Brak danych obecności.</p>'}
    </div>`;

      showModal(`Kartoteka kursanta #${id}`, body,
        `<button class="btn btn-secondary" onclick="closeModal()">Zamknij</button>
     <button class="btn btn-primary" style="background:var(--red);border-color:var(--red)" onclick="confirmDeleteStudent(${id},'${(s.first_name + ' ' + s.last_name).replace(/'/g, "\\'")}')">Usuń kursanta</button>`);
    }

    async function saveStudentData(id) {
      const data = {
        first_name: document.getElementById('sk-fn')?.value?.trim(),
        last_name: document.getElementById('sk-ln')?.value?.trim(),
        email: document.getElementById('sk-em')?.value?.trim() || null,
        phone: document.getElementById('sk-ph')?.value?.trim() || null,
        birth_year: parseInt(document.getElementById('sk-by')?.value) || null,
        is_active: document.getElementById('sk-ac')?.value === 'true',
      };
      try {
        await aF(`/students/${id}`, { method: 'PATCH', body: JSON.stringify(data) });
        toast('Dane kursanta zapisane');
        if (CV === 'unified-students') fetchUS();
      } catch (e) { toast('Błąd: ' + e.message, 'error'); }
    }

    async function changeStudentRegPay(studentId, regId, status) {
      try {
        await aF(`/students/${studentId}/reg-payment`, { method: 'PATCH', body: JSON.stringify({ registration_id: regId, payment_status: status }) });
        toast('Status płatności zaktualizowany');
        if (CV === 'unified-students') fetchUS();
      } catch (e) { toast('Błąd: ' + e.message, 'error'); }
    }

    async function toggleStudentAtt(studentId, attId, present) {
      try {
        await aF(`/students/${studentId}/attendance/${attId}`, { method: 'PATCH', body: JSON.stringify({ present }) });
        toast('Obecność zmieniona');
        openStudentKartoteka(studentId);
      } catch (e) { toast('Błąd: ' + e.message, 'error'); }
    }

    function confirmDeleteStudent(id, name) {
      if (!confirm(`Usunąć kursanta "${name}"?\nJeśli ma historię treningów lub płatności — zostanie zdezaktywowany (nie usunięty).`)) return;
      deleteStudent(id);
    }

    async function deleteStudent(id) {
      try {
        const d = await aF(`/students/${id}`, { method: 'DELETE' });
        toast(d.soft ? 'Kursant zdezaktywowany (ma historię)' : 'Kursant usunięty');
        closeModal();
        if (CV === 'unified-students') fetchUS();
      } catch (e) { toast('Błąd: ' + e.message, 'error'); }
    }

    // ── Nowy kursant ──────────────────────────────────────────────
    async function openNewStudentModal() {
      let groupOpts = '<option value="">Brak grupy</option>';
      try {
        const gd = arrRows(await aF('/groups'));
        gd.forEach(g => { groupOpts += `<option value="${g.id}">${g.name}${g.city ? ' (' + g.city + ')' : ''}</option>`; });
      } catch (e) { }

      showModal('Nowy kursant', `
    <div class="fg">
      <div class="ff"><label>Imię *</label><input id="ns-fn" placeholder="Jan"></div>
      <div class="ff"><label>Nazwisko *</label><input id="ns-ln" placeholder="Kowalski"></div>
    </div>
    <div class="fg">
      <div class="ff"><label>Email</label><input id="ns-em" type="email" placeholder="jan@email.pl"></div>
      <div class="ff"><label>Telefon</label><input id="ns-ph" placeholder="600 000 000"></div>
    </div>
    <div class="fg">
      <div class="ff"><label>Rok urodzenia</label><input id="ns-by" type="number" placeholder="1990" min="1950" max="2015"></div>
      <div class="ff"><label>Przypisz do grupy</label><select id="ns-gr">${groupOpts}</select></div>
    </div>
    <div id="ns-err" style="color:var(--red-l);font-size:12px;margin-top:8px;display:none"></div>`,
        `<button class="btn btn-secondary" onclick="closeModal()">Anuluj</button>
     <button class="btn btn-primary" onclick="createNewStudent()">Dodaj kursanta</button>`);
    }

    async function createNewStudent() {
      const fn = document.getElementById('ns-fn')?.value?.trim();
      const ln = document.getElementById('ns-ln')?.value?.trim();
      const errEl = document.getElementById('ns-err');
      if (!fn || !ln) { errEl.textContent = 'Imię i nazwisko są wymagane.'; errEl.style.display = 'block'; return; }
      try {
        await aF('/students', {
          method: 'POST', body: JSON.stringify({
            first_name: fn, last_name: ln,
            email: document.getElementById('ns-em')?.value?.trim() || null,
            phone: document.getElementById('ns-ph')?.value?.trim() || null,
            birth_year: parseInt(document.getElementById('ns-by')?.value) || null,
            group_id: document.getElementById('ns-gr')?.value ? parseInt(document.getElementById('ns-gr').value) : null,
          })
        });
        toast('Kursant dodany');
        closeModal();
        if (CV === 'unified-students') fetchUS();
        else if (CV === 'participants') fetchR('admin');
        else if (CV === 'web-registrations') fetchR('web');
      } catch (e) { errEl.textContent = e.message; errEl.style.display = 'block'; }
    }

    // ── Płatności — modale ────────────────────────────────────────
    let _payStudentId = null, _payId = null;

    function openAddPayModal(studentId) {
      _payStudentId = studentId; _payId = null;
      showModal('Nowa płatność', `
    <div class="fg">
      <div class="ff"><label>Kwota (zł) *</label><input id="pm-amt" type="number" step="0.01" placeholder="120.00"></div>
      <div class="ff"><label>Data</label><input id="pm-dt" type="date" value="${new Date().toISOString().slice(0, 10)}"></div>
    </div>
    <div class="ff"><label>Notatka</label><input id="pm-note" placeholder="np. przelew, gotówka…"></div>
    <div id="pm-err" style="color:var(--red-l);font-size:12px;margin-top:8px;display:none"></div>`,
        `<button class="btn btn-secondary" onclick="openStudentKartoteka(${studentId})">Anuluj</button>
     <button class="btn btn-primary" onclick="submitStudentPayment()">Zapisz płatność</button>`);
    }

    function openEditPayModal(studentId, pid, amount, date, note) {
      _payStudentId = studentId; _payId = pid;
      showModal('Edytuj płatność', `
    <div class="fg">
      <div class="ff"><label>Kwota (zł) *</label><input id="pm-amt" type="number" step="0.01" value="${amount}"></div>
      <div class="ff"><label>Data</label><input id="pm-dt" type="date" value="${date}"></div>
    </div>
    <div class="ff"><label>Notatka</label><input id="pm-note" value="${note}"></div>
    <div id="pm-err" style="color:var(--red-l);font-size:12px;margin-top:8px;display:none"></div>`,
        `<button class="btn btn-secondary" onclick="openStudentKartoteka(${studentId})">Anuluj</button>
     <button class="btn btn-primary" onclick="submitStudentPayment()">Zapisz zmiany</button>`);
    }

    async function submitStudentPayment() {
      const amount = parseFloat(document.getElementById('pm-amt')?.value);
      const date = document.getElementById('pm-dt')?.value;
      const note = document.getElementById('pm-note')?.value || null;
      const errEl = document.getElementById('pm-err');
      if (!amount) { errEl.textContent = 'Podaj kwotę.'; errEl.style.display = 'block'; return; }
      try {
        if (_payId) {
          await aF(`/students/${_payStudentId}/payments/${_payId}`, { method: 'PATCH', body: JSON.stringify({ amount, paid_at: date, note }) });
        } else {
          await aF(`/students/${_payStudentId}/payments`, { method: 'POST', body: JSON.stringify({ amount, date, note }) });
        }
        toast('Płatność zapisana');
        openStudentKartoteka(_payStudentId);
        if (CV === 'unified-students') fetchUS();
      } catch (e) { errEl.textContent = e.message; errEl.style.display = 'block'; }
    }

    async function deleteStudentPayment(studentId, pid) {
      if (!confirm('Usunąć tę płatność?')) return;
      try {
        await aF(`/students/${studentId}/payments/${pid}`, { method: 'DELETE' });
        toast('Płatność usunięta');
        openStudentKartoteka(studentId);
        if (CV === 'unified-students') fetchUS();
      } catch (e) { toast('Błąd: ' + e.message, 'error'); }
    }

    async function fetchHistStudents() {
      const tbody = document.getElementById('hs-body');
      if (!tbody) return;
      tbody.innerHTML = '<tr><td colspan="8"><div class="loader"><div class="spinner"></div></div></td></tr>';
      const q = document.getElementById('hs-q')?.value || '';
      const statusFilter = document.getElementById('hs-status')?.value || '';
      try {
        const d = await aF(`/history?tab=students&search=${encodeURIComponent(q)}&page=${hsPage}&limit=60`);
        let rows = arrRows(d);
        const total = d.total || rows.length;

        // Filtrowanie po stronie klienta (status aktywności / płatności)
        const now = new Date();
        const MS60 = 60 * 24 * 60 * 60 * 1000;
        if (statusFilter === 'active') {
          rows = rows.filter(s => s.last_training && (now - new Date(s.last_training)) < MS60);
        } else if (statusFilter === 'no_payment') {
          rows = rows.filter(s => !s.last_payment || (now - new Date(s.last_payment)) > MS60);
        } else if (statusFilter === 'never_paid') {
          rows = rows.filter(s => !s.total_paid || Number(s.total_paid) === 0);
        }

        const countEl = document.getElementById('hs-count');
        if (countEl) countEl.textContent = (statusFilter ? rows.length + ' / ' : '') + total + ' kursantów';

        function paymentBadge(s) {
          if (!s.last_payment && (!s.total_paid || Number(s.total_paid) === 0)) {
            return '<span class="badge br" title="Brak wpłat w historii">brak wpłat</span>';
          }
          if (!s.last_payment) return '<span style="color:var(--dim);font-size:11px">—</span>';
          const daysSince = Math.floor((now - new Date(s.last_payment)) / (24 * 60 * 60 * 1000));
          const dateStr = fd(s.last_payment);
          if (daysSince <= 45) {
            return `<span class="badge bg" title="${daysSince} dni temu">${dateStr}</span>`;
          } else if (daysSince <= 90) {
            return `<span class="badge bx" title="${daysSince} dni temu — sprawdź płatność">${dateStr}</span>`;
          } else {
            return `<span class="badge br" title="${daysSince} dni temu — możliwa zaległość">${dateStr} ⚠</span>`;
          }
        }

        function trainingBadge(s) {
          if (!s.last_training) return '<span style="color:var(--dim)">—</span>';
          const daysSince = Math.floor((now - new Date(s.last_training)) / (24 * 60 * 60 * 1000));
          const dateStr = fd(s.last_training);
          if (daysSince <= 30) return `<span style="color:var(--green);font-size:11px;font-family:monospace">${dateStr}</span>`;
          if (daysSince <= 60) return `<span style="color:var(--orange,#f80);font-size:11px;font-family:monospace">${dateStr}</span>`;
          return `<span style="color:var(--dim);font-size:11px;font-family:monospace">${dateStr}</span>`;
        }

        tbody.innerHTML = rows.length ? rows.map(s => {
          const grpArr = Array.isArray(s.groups) ? s.groups : [];
          // Deduplikacja - może być duplikaty w json_agg
          const uniqGroups = grpArr.filter((g, i, a) => a.findIndex(x => x.group_id === g.group_id) === i);
          const grpHtml = uniqGroups.length
            ? uniqGroups.slice(0, 2).map(g => `<span class="badge bb" style="font-size:10px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle">${g.group_name || '?'}</span>`).join(' ')
            + (uniqGroups.length > 2 ? `<span style="font-size:10px;color:var(--dim)"> +${uniqGroups.length - 2}</span>` : '')
            : '<span style="color:var(--dim)">—</span>';

          return `
      <tr>
        <td>
          <strong style="color:var(--bright)">${s.first_name} ${s.last_name}</strong>
          ${!s.is_active ? '<br><span class="badge br" style="font-size:9px">Nieaktywny</span>' : ''}
        </td>
        <td style="font-size:11px;color:var(--dim)">${s.email || '—'}${s.phone ? '<br>' + s.phone : ''}</td>
        <td style="max-width:180px">${grpHtml}</td>
        <td style="text-align:center;font-weight:bold">${s.total_attendances || 0}</td>
        <td>${trainingBadge(s)}</td>
        <td>${paymentBadge(s)}</td>
        <td><strong style="color:${Number(s.total_paid) > 0 ? 'var(--green)' : 'var(--dim)'}">${s.total_paid ? Number(s.total_paid).toFixed(0) + ' zł' : '—'}</strong></td>
        <td><button class="bi" onclick="openStudentKartoteka(${s.id})">Kartoteka</button></td>
      </tr>`;
        }).join('')
          : '<tr><td colspan="8"><div class="empty">Brak wyników</div></td></tr>';

        const pages = Math.ceil(total / 60);
        const pagEl = document.getElementById('hs-pag');
        if (pagEl) pagEl.innerHTML = pages > 1 ? `
      <button ${hsPage <= 1 ? 'disabled' : ''} onclick="hsPage--;fetchHistStudents()">Wstecz</button>
      <span class="pi">Strona ${hsPage} z ${pages}</span>
      <button ${hsPage >= pages ? 'disabled' : ''} onclick="hsPage++;fetchHistStudents()">Dalej</button>` : '';
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="8" style="color:var(--red-l);padding:16px">${e.message}</td></tr>`;
      }
    }

        group_ids: getCheckedGroupIds('ei'),
      };
      if (pw) data.password = pw;
      try {

        const permKeys = ['can_see_groups','can_see_student_count','can_mark_attendance','can_add_student','can_see_paid_status','can_see_payments','can_see_payments_tab','can_accept_payment','can_assign_instructors'];

    async function asLoadGroups(keepGid) {
      const instId = document.getElementById('as-inst')?.value || AS.instId;
      AS.instId = instId;
      const grpSel = document.getElementById('as-grp');
      if (!instId) { if (grpSel) { grpSel.disabled = true; grpSel.innerHTML = '<option value="">— wybierz grupę —</option>'; } return; }
      try {
        const inst = await aF(`/instructors/${instId}`);
        const groups = inst.groups || [];
        if (grpSel) {
          grpSel.innerHTML = '<option value="">— wybierz grupę —</option>' +
            groups.map(g => `<option value="${g.id}" ${AS.gid == g.id ? 'selected' : ''}>${g.name}</option>`).join('');
          grpSel.disabled = false;
        }
        if (AS.gid && groups.find(g => g.id == AS.gid)) await asLoadCal();
      } catch(e) { toast('Błąd: ' + e.message, 'error'); }
    }

    async function asSelectGroup() {
      AS.gid = document.getElementById('as-grp')?.value || null;
      await asLoadCal();
    }

    async function asLoadCal() {
      const gid = AS.gid || document.getElementById('as-grp')?.value;
      const cal = document.getElementById('as-cal');
      if (!gid || !cal) return;
      AS.gid = gid;

      const y = AS.y, m = AS.m;
      const from = `${y}-${String(m+1).padStart(2,'0')}-01`;
      const lastD = new Date(y, m+1, 0).getDate();
      const to = `${y}-${String(m+1).padStart(2,'0')}-${String(lastD).padStart(2,'0')}`;

      try {
        const d = await aF(`/sessions?group_id=${gid}&from=${from}&to=${to}`);
        asRenderCal(y, m, gid, d.rows || []);
      } catch(e) { cal.innerHTML = `<div class="empty">Błąd: ${e.message}</div>`; }
    }

    function asRenderCal(y, m, gid, sessions) {
      const smap = {};
      sessions.forEach(s => { smap[s.session_date] = s; });

      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const firstDow = new Date(y, m, 1).getDay();
      const offset = firstDow === 0 ? 6 : firstDow - 1;
      const daysInM = new Date(y, m+1, 0).getDate();
      const DAYS = ['Pon','Wt','Śr','Czw','Pt','Sob','Ndz'];

      let html = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;max-width:700px">`;
      DAYS.forEach(d => { html += `<div style="text-align:center;font-size:10px;font-weight:700;color:var(--dim);padding:4px 0">${d}</div>`; });
      for (let i = 0; i < offset; i++) html += `<div style="min-height:50px"></div>`;

      for (let d = 1; d <= daysInM; d++) {
        const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const sess = smap[iso];
        const isToday = iso === todayStr;
        if (sess) {
          html += `<div onclick="asDeleteSession(${sess.session_id},'${iso}',${gid})"
            style="background:rgba(26,153,82,.12);border:1px solid rgba(26,153,82,.35);border-radius:6px;min-height:50px;padding:6px;cursor:pointer;text-align:center">
            <div style="font-weight:700;font-size:13px;color:#3dd68c">${d}</div>
            <div style="font-size:9px;color:rgba(61,214,140,.7)">✓ sesja</div>
            <div style="font-size:9px;color:var(--dim)">${sess.present_count}/${sess.total_marked}</div>
          </div>`;
        } else {
          html += `<div onclick="asCreateSession('${iso}',${gid})"
            style="background:${isToday ? 'rgba(200,35,10,.08)' : 'var(--panel2)'};border:1px solid ${isToday ? 'rgba(200,35,10,.3)' : 'var(--line)'};border-radius:6px;min-height:50px;padding:6px;cursor:pointer;text-align:center">
            <div style="font-weight:700;font-size:13px;color:${isToday ? 'var(--accent2)' : 'var(--text)'}">${d}</div>
            <div style="font-size:9px;color:var(--dim2)">+ dodaj</div>
          </div>`;
        }
      }
      html += `</div><div style="margin-top:10px;font-size:11px;color:var(--dim)">Kliknij zielony dzień aby usunąć sesję. Kliknij pusty dzień aby dodać sesję.</div>`;
      document.getElementById('as-cal').innerHTML = html;
    }

    async function asCreateSession(date, gid) {
      if (!confirm(`Dodać sesję treningową na ${date}?`)) return;
      try {
        await aF('/sessions', { method: 'POST', body: JSON.stringify({ group_id: parseInt(gid), session_date: date }) });
        toast('Sesja dodana');
        await asLoadCal();
      } catch(e) { toast('Błąd: ' + e.message, 'error'); }

    async function asDeleteSession(sid, date, gid) {
      if (!confirm(`Usunąć sesję z dnia ${date}?\n\nWszystkie zapisane obecności zostaną skasowane.`)) return;
      try {
        await aF(`/sessions/${sid}`, { method: 'DELETE' });
