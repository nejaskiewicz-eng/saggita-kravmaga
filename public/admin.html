    function buildGroupCheckboxes(groups, selectedIds, prefix) {
      const sel = new Set((selectedIds || []).map(Number));
      // Tylko aktywne grupy
      const activeGroups = groups.filter(g => g.active !== false);
      const byCityOrder = [];
      const cityMap = {};
      activeGroups.forEach(g => {
        const city = g.city || g.location_city || '';
        if (!cityMap[city]) { cityMap[city] = []; byCityOrder.push(city); }
        cityMap[city].push(g);
      });
      let html = '<div class="grp-chk-list" id="' + prefix + '-grp-list">';
      byCityOrder.forEach(city => {
        cityMap[city].forEach(g => {
          const chk = sel.has(g.id) ? 'checked' : '';
          html += `<label class="grp-chk-item">
        <input type="checkbox" value="${g.id}" ${chk}>
        <span>${g.name || ''}</span>
        ${city ? `<span class="grp-chk-city">${city}</span>` : ''}
      </label>`;
        });
      });
      html += '</div>';
      return html;
    }

    // ── MOBILE: auto data-label on tables ───────────────────────
    // Adds data-label attrs to td elements based on column headers
    // Called after any table is rendered into #content
    function applyTableLabels(root) {
      root = root || document.getElementById('content');
      if (!root) return;
      root.querySelectorAll('.tw table').forEach(table => {
        const ths = Array.from(table.querySelectorAll('thead th')).map(th => th.textContent.trim());
        table.querySelectorAll('tbody tr').forEach(tr => {
          Array.from(tr.querySelectorAll('td')).forEach((td, i) => {
            if (ths[i]) td.setAttribute('data-label', ths[i]);
          });
        });
      });
    }

    // Observe #content for DOM changes and apply labels automatically
    (function () {
      const content = document.getElementById('content');
      if (!content) return;
      const obs = new MutationObserver(() => applyTableLabels(content));
      obs.observe(content, { childList: true, subtree: true });
    })();

        });
        closeModal();
        toast('Grupa została zmieniona', 'success');
        if (typeof loadReg === 'function') loadReg();
      } catch (e) {
        toast('Błąd zmiany grupy: ' + e.message, 'error');
      }
    }

    async function downloadAdminDocs(id) {
      const win = window.open('', '_blank');
      win.document.write('<html><body><div style="font-family:sans-serif;padding:20px">Ładowanie dokumentu...</div></body></html>');

      try {
        // Try to find in cache first
        let r = (window.currentRows || []).find(x => x.id == id);

        // If not in cache or missing doc_data, fetch fresh
        if (!r || !r.doc_data) {
          r = await aF('/registrations?id=' + id);
        }

        if (!r || !r.doc_data) {
          win.document.body.innerHTML = '<div style="color:red;padding:20px">Brak dokumentów (doc_data) dla tego uczestnika.</div>';
          return;
        }

        const docData = typeof r.doc_data === 'string' ? JSON.parse(r.doc_data) : r.doc_data;
        const isAdult = docData.isAdult;
        const f = docData.fields || {};
        const s = docData.signatures || {};

        const dDate = new Date(r.created_at).toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric' });
        const instructorSigPlaceholder = `<div style="border:1px solid #ccc;border-radius:4px;padding:8px;margin-top:8px;min-width:240px;min-height:70px;display:inline-flex;align-items:center;justify-content:center;color:#999;font-style:italic;background:#fafafa;font-size:12px">[ miejsce na podpis Tadeusza Dubickiego ]</div>`;
        const dateHtml = `<p>Data: <b>${dDate}</b></p>`;

        let html = '';
        if (isAdult) {
          const sig4Html = s.sig4 ? `<img src="${s.sig4}" style="max-height:80px;max-width:260px;display:block;margin:4px 0">` : 'Brak podpisu 1';
          const sig5Html = s.sig5 ? `<img src="${s.sig5}" style="max-height:80px;max-width:260px;display:block;margin:4px 0">` : 'Brak podpisu 2';

          html = `
            <html><head><title>Umowa - ${r.first_name} ${r.last_name}</title>
            <style>body{font-family:sans-serif;padding:30px;line-height:1.5;color:#333}</style></head>
            <body>
              <h1 style="color:#c42000">Umowa o świadczenie usług i Regulamin (Dorosły)</h1>
              <p>Miejscowość: <b>${f.adoc2_address || r.city || '-'}</b></p>
              ${dateHtml}
              <br>
              <p><b>Kursant:</b> ${f.adoc1_name || r.first_name + ' ' + r.last_name}</p>
              <p><b>PESEL:</b> ${f.adoc2_pesel || '-'}</p>
              <p><b>Dokument tożsamości:</b> ${f.adoc2_id || '-'}</p>
              <br><br>
              <div style="display:flex; justify-content:space-between; margin-top:30px;">
                <div style="border-top:1px solid #aaa; padding-top:10px; text-align:center; min-width:260px;">
                  ${sig4Html}
                  <i>Podpis czytelny Kursanta</i>
                </div>
                <div>${instructorSigPlaceholder}</div>
              </div>
              
              <br><br><br><hr><br><br><br>
              
              <h1 style="color:#c42000">Oświadczenie o pełnej zdolności do udziału w zajęciach krav maga i braku przeciwwskazań zdrowotnych i niekaralności</h1>
              <p><b>Ja niżej podpisany(a):</b> ${f.adoc2_name || '-'}</p>
              <p><b>Data urodzenia:</b> ${f.adoc2_dob || '-'}</p>
              <p><b>Adres zamieszkania:</b> ${f.adoc2_address || '-'}</p>
              <br>
              <p>Oświadczam i potwierdzam, że posiadam pełną zdolność do udziału w zajęciach oraz nie byłem karany/a. Zobowiązuję się do przestrzegania regulaminu Akademii Obrony Saggita i poleceń instruktora.</p>
              <br><br>
              <div style="border-top:1px solid #aaa; padding-top:10px; text-align:center; min-width:260px; margin-top:30px; float:right;">
                ${sig5Html}
                <i>Czytelny podpis uczestnika</i>
              </div>
            </body></html>
          `;
        } else {
          // Dzieci
          const sig1Html = s.sig1 ? `<img src="${s.sig1}" style="max-height:80px;max-width:260px;display:block;margin:4px 0">` : 'Brak podpisu 1';
          const sig2Html = s.sig2 ? `<img src="${s.sig2}" style="max-height:80px;max-width:260px;display:block;margin:4px 0">` : 'Brak podpisu 2';
          const sig3Html = s.sig3 ? `<img src="${s.sig3}" style="max-height:80px;max-width:260px;display:block;margin:4px 0">` : 'Brak podpisu 3';

          html = `
            <html><head><title>Umowa - ${f.doc1_child || r.first_name + ' ' + r.last_name}</title>
            <style>body{font-family:sans-serif;padding:30px;line-height:1.5;color:#333}</style></head>
            <body>
              <h1 style="color:#c42000">Umowa o świadczenie usług i Regulamin (Dziecko)</h1>
              ${dateHtml}
              <br>
              <p><b>Opiekun prawny:</b> ${f.doc1_parent || '-'}</p>
              <p><b>Dziecko:</b> ${f.doc1_child || '-'}</p>
              <br><br>
              <div style="display:flex; justify-content:space-between; margin-top:30px;">
                <div style="border-top:1px solid #aaa; padding-top:10px; text-align:center; min-width:260px;">
                  ${sig1Html}
                  <i>Podpis czytelny Rodzica / Opiekuna</i>
                </div>
                <div>${instructorSigPlaceholder}</div>
              </div>

              <br><br><br><hr><br><br><br>
              
              <h1 style="color:#c42000">Zgoda na udział dziecka w zajęciach i ubezpieczenie</h1>
              <p><b>Ja niżej podpisany(a) rodzic/opiekun:</b> ${f.doc2_parent || '-'}</p>
              <p><b>Adres e-mail i telefon:</b> ${f.doc2_address || ''} ${f.doc2_phone || '-'}</p>
              <p><b>Wyrażam zgodę na uczęszczanie mojego dziecka:</b> ${f.doc2_child || '-'}</p>
              <p><b>Data urodzenia dziecka:</b> ${f.doc2_dob || '-'}</p>
              <br>
              <p><b>Zgoda na wizerunek:</b> ${f.doc2_wizerunek ? 'TAK' : 'NIE'}</p>
              <p><b>Osoba odbierająca (inna niż podpisana powyżej):</b> ${f.doc2_emergency || '-'}</p>
              <br><br>
              <div style="border-top:1px solid #aaa; padding-top:10px; text-align:center; min-width:260px; float:right;">
                ${sig2Html}
                <i>Czytelny podpis Rodzica / Opiekuna</i>
              </div>
              <div style="clear:both;"></div>

              <br><br><br><hr><br><br><br>

              <h1 style="color:#c42000">Standardy Ochrony Małoletnich w Akademii</h1>
              <p><b>Ja niżej podpisany(a):</b> ${f.doc3_parent || '-'}</p>
              <p>jako rodzic / prawny opiekun dziecka: <b>${f.doc3_child || '-'}</b></p>
              <p>oświadczam, że zapoznałem/am się ze <i>Standardami Ochrony Małoletnich</i> obowiązującymi w klubie Akademia Obrony Saggita i je akceptuję.</p>
              <br><br>
              <div style="border-top:1px solid #aaa; padding-top:10px; text-align:center; min-width:260px; float:right;">
                ${sig3Html}
                <i>Czytelny podpis Rodzica / Opiekuna</i>
              </div>
            </body></html>
          `;
        }

        win.document.open();
        win.document.write(html);
        win.document.close();
      } catch (e) {
        console.error(e);
        win.document.body.innerHTML = '<div style="color:red;padding:20px">Błąd generowania dokumentu: ' + e.message + '</div>';
        toast('Błąd podczas pobierania dokumentu', 'error');
      }
    }

  </script>
</body>
